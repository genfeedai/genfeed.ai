title = "Gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "genfeedai-api-key"
description = "Genfeed.ai API Key"
regex = '''gf_(live|test)_[A-Za-z0-9_\-]{20,}'''
keywords = ["gf_live_", "gf_test_"]

[allowlist]
description = "Global allowlist"
paths = [
  '''node_modules''',
  '''bun\.lock''',
  '''\.secretlintrc\.json''',
  '''\.gitleaks\.toml''',
  '''package-lock\.json''',
  '''\.spec\.ts$''',
  '''\.test\.ts$''',
]
regexes = [
  # Clerk PUBLISHABLE test key (pk_test_*) — public by design, used as the CI
  # fallback for the e2e Playwright builds in .github/workflows/e2e.yml.
  '''pk_test_ZW5nYWdlZC1wYW50aGVyLTcxLmNsZXJrLmFjY291bnRzLmRldiQ''',
]
