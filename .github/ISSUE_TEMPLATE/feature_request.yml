name: Feature request
description: Propose an outcome or capability for a Genfeed repository surface.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem before the implementation. Search existing issues and pull requests first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Who is blocked, what are they trying to do, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior, not only a proposed technical solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Explain what you use today and why it is insufficient.
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Community self-hosted
        - Cloud
        - Desktop
        - Multiple modes
        - Unsure
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web app
        - REST API or MCP
        - Docker or installation
        - Desktop
        - Mobile
        - Browser extension
        - IDE extension
        - CLI, SDK, or package
        - Other
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Open-source and commercial boundary
      description: Note whether this must work without Cloud, depends on managed services, or affects the ee/ boundary.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, or links with secrets and private data removed.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and pull requests for this request.
          required: true
        - label: I described the user problem and desired outcome.
          required: true
