name: Bug report
description: Report a reproducible defect in a Genfeed repository surface.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues before filing. Security vulnerabilities must follow [SECURITY.md](https://github.com/genfeedai/genfeed.ai/security/policy) and must not be reported publicly.
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Community self-hosted
        - Cloud
        - Local development
        - Unsure
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web app
        - REST API or MCP
        - Docker or installation
        - Desktop
        - Mobile
        - Browser extension
        - IDE extension
        - CLI, SDK, or package
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, package version, image tag, or commit SHA.
      placeholder: v0.5.0 or de16d4450
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, browser/client, Docker version, and relevant provider.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest repeatable sequence.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste only the relevant excerpt. Remove secrets, tokens, personal data, and customer data.
      render: shell
  - type: dropdown
    id: regression
    attributes:
      label: Regression
      options:
        - Yes, this worked before
        - No, it has never worked for me
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and pull requests for this defect.
          required: true
        - label: I removed credentials, tokens, personal data, and customer data.
          required: true
        - label: This is not a security vulnerability.
          required: true
