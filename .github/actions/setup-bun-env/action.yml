name: Setup Bun Environment
description: Standardize Node, Bun, and cache setup for GitHub Actions jobs.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: '22.x'
  bun-version:
    description: Bun version to install
    required: false
    default: '1.3.14'
  install-command:
    description: Dependency install command to run after toolchain setup
    required: false
    default: 'bun install --frozen-lockfile'
  cache-turbo:
    description: Whether to cache the local Turbo directory
    required: false
    default: 'true'
  cache-playwright:
    description: |
      Whether to cache Playwright browser binaries (chromium) and install
      them when the cache is cold. Defaults to false so existing callers are
      unaffected.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache bun modules
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Cache Turbo
      if: ${{ inputs.cache-turbo == 'true' }}
      uses: actions/cache@v5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    # Neutralize the biggest install-time network side-effect at the source.
    # ffmpeg-static (a transitive dep) postinstalls by downloading a ~40MB binary
    # from the GitHub releases CDN on EVERY `bun install`. Fanned across the ~35
    # cold-cache jobs of a release/deploy run, a single CDN hiccup fails a job and
    # (via cancel-doomed-run) cancels the entire production deploy. No CI job ever
    # executes ffmpeg — every consumer spec mocks the `ffmpeg-static` module — so
    # point it at the runner's own ffmpeg via FFMPEG_BIN: the package's index.js
    # exports that path verbatim and its install.js skips the download when the
    # file exists. This removes the CDN call the retry loop below was fighting.
    - name: Use system ffmpeg (skip ffmpeg-static CDN download)
      shell: bash
      run: |
        # ubuntu-latest ships ffmpeg, so this apt path is a rare fallback. Keep
        # it non-fatal (|| true): if it can't install, FFMPEG_BIN resolves empty
        # and ffmpeg-static falls back to its CDN download (guarded by the retry
        # loop) — i.e. the pre-existing behavior, never a new failure mode.
        if ! command -v ffmpeg >/dev/null 2>&1; then
          sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg || true
        fi
        echo "FFMPEG_BIN=$(command -v ffmpeg)" >> "$GITHUB_ENV"

    # Retry with exponential backoff as defense against generic registry/CDN
    # transients (the ffmpeg-static download is neutralized above via FFMPEG_BIN).
    # bun install is idempotent, so re-running only re-attempts what is missing. A
    # cold-cache release/deploy runs this across ~35 parallel jobs where a single
    # job's failure cancels the whole deploy via cancel-doomed-run, so 5 attempts
    # with 10/20/40/80s backoff keeps a lone transient from taking the run down.
    - name: Install dependencies
      shell: bash
      env:
        MAX_ATTEMPTS: '5'
      run: |
        for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
          echo "::group::install attempt ${attempt}/${MAX_ATTEMPTS}: ${{ inputs.install-command }}"
          if ${{ inputs.install-command }}; then
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"
          if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
            backoff=$((10 * 2 ** (attempt - 1)))
            echo "::warning::install attempt ${attempt}/${MAX_ATTEMPTS} failed; retrying in ${backoff}s"
            sleep "${backoff}"
          fi
        done
        echo "::error::install failed after ${MAX_ATTEMPTS} attempts"
        exit 1

    # Playwright browser binaries — key matches the strategy used by the inline
    # e2e jobs so warm cache entries are reused when jobs migrate here.
    - name: Cache Playwright browsers
      if: ${{ inputs.cache-playwright == 'true' }}
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

    - name: Install Playwright browsers (cache miss)
      if: ${{ inputs.cache-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Install Playwright OS deps (cache hit)
      if: ${{ inputs.cache-playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: npx playwright install-deps chromium || true
