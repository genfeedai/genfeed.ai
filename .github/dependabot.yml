# Dependabot configuration
#
# Policy: SECURITY-ONLY for npm + docker. Routine dependency refreshes there are
# done in one sweep with `bun run deps:update` (npm-check-updates) and land via a
# single reviewed PR, instead of a stream of per-package version-update PRs that
# only add CI noise.
#
# EXCEPTION — github-actions: version updates ARE enabled but GROUPED into a
# single weekly PR. Action-pin drift (e.g. upload-artifact @v4 vs @v7) forced the
# manual #895 Node-24 sweep; grouping self-corrects that drift without the
# per-action PR stream the security-only policy was avoiding.
#
# `open-pull-requests-limit: 0` disables version-update PRs for npm + docker.
# Dependabot SECURITY updates are NOT subject to that limit and still open against
# the default branch (master) — that is the signal we actually want to see.
#
# Bun security updates are not yet supported by Dependabot (version updates only,
# GA 2025-02). Track upstream: https://github.com/dependabot/dependabot-core/issues/6528
version: 2

updates:
  # JS/TS dependencies — bun workspaces monorepo (reads text-based bun.lock).
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    # Security-only: no routine version-update PRs.
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "javascript"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # GitHub Actions — workflows in .github/workflows + composite actions.
  # Version updates ENABLED but grouped: every action bump lands in one weekly PR
  # so pin drift self-corrects (the recurrence that caused the #895 manual sweep)
  # without the per-action PR stream the security-only policy avoided.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Docker base images — docker/Dockerfile, Dockerfile.server, Dockerfile.selfhosted.
  - package-ecosystem: "docker"
    directory: "/docker"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
