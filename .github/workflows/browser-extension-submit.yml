name: Browser Extension - Submit to Web Store

on:
  workflow_dispatch:
  push:
    tags:
      - 'extension-browser-v*'
    paths:
      - 'apps/extensions/browser/**'

concurrency:
  group: browser-extension-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run extension tests
        run: bun run test --filter="./apps/extensions/browser/*"

  build-and-submit:
    name: Build & Submit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    defaults:
      run:
        working-directory: apps/extensions/browser/app
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Get bun store directory
        id: bun-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(bun store path)" >> $GITHUB_OUTPUT

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ${{ steps.bun-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-bun-store-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Use Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build the extension
        run: bun run build

      - name: Package the extension into a zip artifact
        run: bun run package

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: browser-extension-build
          path: apps/extensions/browser/app/build/chrome-mv3-prod.zip

      - name: Browser Platform Publish
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.EXTENSION_SUBMIT_KEYS }}
          artifact: apps/extensions/browser/app/build/chrome-mv3-prod.zip
