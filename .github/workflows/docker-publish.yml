name: Docker Publish (Self-Hosted)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: latest)"
        required: false
        default: "latest"
      release_tag:
        description: "Recover assets for an existing release tag at current master (for example, v0.5.0)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # The community self-hosted image is what users `docker run`. Only master may
  # produce it — a release cut from any non-master ref, or a manual dispatch off
  # a feature branch, would otherwise ship pre-release code as the public image.
  # Mirrors the production master-only release policy.
  validate-master-ref:
    name: Validate master ref
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      advance_latest: ${{ steps.release.outputs.advance_latest }}
      attach_assets: ${{ steps.release.outputs.attach_assets }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
      image_tag: ${{ steps.release.outputs.image_tag }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Require master for self-hosted publish
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_IMAGE_TAG: ${{ inputs.tag }}
          RECOVERY_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Self-hosted publish via workflow_dispatch must run from master. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

          release_tag="${RELEASE_TAG}"
          recovery=false
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${RECOVERY_RELEASE_TAG}" ]; then
            release_tag="${RECOVERY_RELEASE_TAG}"
            recovery=true
          fi

          if [ -n "${release_tag}" ]; then
            if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Release tag must use vX.Y.Z semver: ${release_tag}"
              exit 1
            fi

            # Verify the released tag's commit is contained in master. target_commitish is
            # unreliable — GitHub ignores it once the tag exists, and it never equals "master"
            # when a SHA target is used — so compare the tag against master via the API instead.
            status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/master...${release_tag}" --jq '.status')"
            case "${status}" in
              identical|behind)
                echo "Release tag ${release_tag} is on master (compare status: ${status})." ;;
              *)
                echo "::error::Self-hosted releases must be cut from a commit on master. Tag ${release_tag} vs master compare status: ${status}"
                exit 1 ;;
            esac

            if [ "${recovery}" = "true" ] && [ "${status}" != "identical" ]; then
              echo "::error::Recovery tag ${release_tag} must point exactly at current master, not a historical commit."
              exit 1
            fi

            if [ "${recovery}" = "true" ]; then
              release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}")"
              if [ "$(jq -r '.draft' <<< "${release_json}")" != "false" ]; then
                echo "::error::Recovery requires an existing published, non-draft GitHub release for ${release_tag}."
                exit 1
              fi

              existing_assets="$(jq '[.assets[] | select(.name == "genfeed-selfhosted.tar.gz" or .name == "genfeed-selfhosted.tar.gz.sha256")] | length' <<< "${release_json}")"
              if [ "${existing_assets}" -ne 0 ]; then
                echo "::error::Release ${release_tag} already has self-hosted install assets; refusing to overwrite them."
                exit 1
              fi
            fi

            image_tag="${release_tag#v}"
            advance_latest=true
            if [ "${RELEASE_PRERELEASE}" = "true" ] || [[ "${release_tag}" == *-* ]]; then
              advance_latest=false
            fi

            {
              echo "advance_latest=${advance_latest}"
              echo "attach_assets=true"
              echo "checkout_ref=${release_tag}"
              echo "image_tag=${image_tag}"
              echo "release_tag=${release_tag}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "advance_latest=false"
            echo "attach_assets=false"
            echo "checkout_ref=${GITHUB_SHA}"
            echo "image_tag=${MANUAL_IMAGE_TAG}"
            echo "release_tag="
          } >> "${GITHUB_OUTPUT}"

  # Full-suite gate — the community image users `docker run` must not publish
  # until the ENTIRE suite is green: the ci.yml unit matrix (sharded app + api +
  # packages + server services + web/desktop/mobile + extensions), the prod-image
  # build-verify boot check, and the e2e suite. full-suite chains all three via
  # workflow_call. Mirrors the qa-before-deploy gate in deploy-ecs.yml so a
  # release publishes the same verification bar a production deploy clears.
  verify-suite:
    name: Full Suite (pre-publish gate)
    needs: validate-master-ref
    # Mirror deploy-ecs.yml's qa-before-deploy grant: ci.yml requests
    # pull-requests/statuses write, build-verify needs packages:write (GHCR
    # cache login), and full-suite's cancel-doomed-run needs actions:write to
    # cancel this run on a red gate. A reusable workflow is capped by the
    # caller's job-level permissions, so they must be declared here, not just
    # at workflow top-level.
    permissions:
      actions: write
      contents: read
      issues: write
      packages: write
      pull-requests: write
      statuses: write
    uses: ./.github/workflows/full-suite.yml
    secrets: inherit

  # Community-image boot gate — full-suite's build-verify covers the MICROSERVICE
  # (prod) image, not docker/Dockerfile.selfhosted. This is the all-in-one
  # community image this workflow is about to push, so its dedicated build/boot
  # guard (previously wired into nothing automated) must gate the publish too.
  verify-selfhosted:
    name: Self-Hosted Build Verify (pre-publish gate)
    needs: validate-master-ref
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-verify-selfhosted.yml

  build-and-push:
    name: Build & Push Self-Hosted Image
    needs: [validate-master-ref, verify-suite, verify-selfhosted]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-master-ref.outputs.checkout_ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # validate-master-ref already proves release tags belong to master.
            # Every successful stable release therefore advances :latest.
            type=raw,value=${{ needs.validate-master-ref.outputs.image_tag }},enable=${{ needs.validate-master-ref.outputs.attach_assets == 'true' }}
            type=raw,value=latest,enable=${{ needs.validate-master-ref.outputs.advance_latest == 'true' }}
            type=raw,value=${{ needs.validate-master-ref.outputs.image_tag }},enable=${{ needs.validate-master-ref.outputs.attach_assets == 'false' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.selfhosted
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=selfhosted
          cache-to: type=gha,mode=max,scope=selfhosted

  # One public contract for every installer: the GitHub tag, exact GHCR tag,
  # checksummed release bundle, and @genfeedai/create smoke must agree before
  # assets appear on the release. This job deliberately does not log in to GHCR;
  # an anonymous pull is the behavior public self-hosters need.
  publish-install-artifact:
    name: Publish & Smoke Public Install Artifact
    if: needs.validate-master-ref.outputs.attach_assets == 'true'
    needs: [validate-master-ref, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.validate-master-ref.outputs.release_tag }}
    steps:
      - name: Checkout released source
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup create package
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "24.x"
          bun-version: "1.3.14"
          cache-turbo: "false"
          install-command: "bun install --filter @genfeedai/create --frozen-lockfile --ignore-scripts"

      - name: Test and build create package
        run: |
          bun run --cwd packages/create test
          bun run --cwd packages/create check
          bun run --cwd packages/create build

      - name: Build version-pinned release bundle
        id: bundle
        run: scripts/sh/create-selfhosted-release-bundle.sh "${RELEASE_TAG}" "release/${RELEASE_TAG}"

      - name: Smoke create against the release bundle
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/create-package" "${RUNNER_TEMP}/create-runner"
          (
            cd packages/create
            bun pm pack --destination "${RUNNER_TEMP}/create-package" --ignore-scripts
          )
          create_archive="$(find "${RUNNER_TEMP}/create-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          (
            cd "${RUNNER_TEMP}/create-runner"
            bun add "${create_archive}" --ignore-scripts
          )
          create_bin="${RUNNER_TEMP}/create-runner/node_modules/.bin/genfeedai"
          test "$("${create_bin}" --version)" = "$(jq -r '.version' packages/create/package.json)"

          python3 -m http.server 8765 --directory release >/tmp/genfeed-release-server.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}"' EXIT

          GENFEED_RELEASE_DOWNLOAD_BASE_URL=http://127.0.0.1:8765 \
            "${create_bin}" "${RUNNER_TEMP}/genfeed-install" \
              --release "${RELEASE_TAG}" --no-start

          test "$(jq -r '.releaseTag' "${RUNNER_TEMP}/genfeed-install/release.json")" = "${RELEASE_TAG}"
          test "$(jq -r '.image' "${RUNNER_TEMP}/genfeed-install/release.json")" = \
            "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.bundle.outputs.image_tag }}"
          docker compose \
            --env-file "${RUNNER_TEMP}/genfeed-install/.env" \
            -f "${RUNNER_TEMP}/genfeed-install/compose.yml" \
            config --images | grep -Fx \
              "ghcr.io/${GITHUB_REPOSITORY}:${{ steps.bundle.outputs.image_tag }}"

      - name: Anonymous exact-image pull and metadata check
        env:
          IMAGE_TAG: ${{ steps.bundle.outputs.image_tag }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG}"
          docker pull "${image}"

          actual_version="$(docker image inspect "${image}" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
          actual_revision="$(docker image inspect "${image}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          expected_revision="$(git rev-parse HEAD)"

          test "${actual_version}" = "${IMAGE_TAG}"
          test "${actual_revision}" = "${expected_revision}"

      - name: Attach install bundle to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.bundle.outputs.archive }}
            ${{ steps.bundle.outputs.checksum }}
