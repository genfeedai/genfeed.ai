name: Docker Publish (Self-Hosted)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # The community self-hosted image is what users `docker run`. Only master may
  # produce it — a release cut from any non-master ref, or a manual dispatch off
  # a feature branch, would otherwise ship pre-release code as the public image.
  # Mirrors the production master-only release policy.
  validate-master-ref:
    name: Validate master ref
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require master for self-hosted publish
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Self-hosted publish via workflow_dispatch must run from master. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "release" ] && [ "${RELEASE_TARGET_COMMITISH}" != "master" ]; then
            echo "::error::Self-hosted releases must target master. Current target: ${RELEASE_TARGET_COMMITISH}"
            exit 1
          fi
        env:
          RELEASE_TARGET_COMMITISH: ${{ github.event.release.target_commitish || '' }}

  build-and-push:
    name: Build & Push Self-Hosted Image
    needs: validate-master-ref
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.selfhosted
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=selfhosted
          cache-to: type=gha,mode=max,scope=selfhosted
