# ECS production deploy (replaces the SSH-waves path post-cutover).
# Dispatch-only. Flow: validate master -> QA before deploy -> _deploy-ecs-core
# (resolve server:<sha> in GHCR -> copy GHCR->ECR -> RDS snapshot -> migrate ->
# workflow backfill -> boot-smoke -> terraform roll -> services-stable -> Vercel
# -> post-deploy smoke).
#
# The deploy engine lives in the reusable .github/workflows/_deploy-ecs-core.yml,
# shared with the admin-only emergency path (deploy-ecs-fastlane.yml). The ONLY
# difference between the two is this file's `qa-before-deploy` gate, which the
# fastlane path deliberately skips.
name: Deploy ECS (production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "server image tag to deploy (default: current SHA)"
        required: false
        default: ""
      allow_rollback:
        description: "allow deploying an image tag different from current SHA"
        required: false
        default: false
        type: boolean

# Per-workflow group: dedupes rapid double-dispatch of the NORMAL path only.
# Cross-path serialization (never roll two deploys at once) is enforced at the
# job level inside _deploy-ecs-core.yml (group: deploy-ecs-roll), so a long QA
# run here does not hold a lock that would block the emergency fastlane.
concurrency:
  group: deploy-ecs-normal
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  validate-production-ref:
    name: Validate production ref
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate ref is master
        run: |
          # Check the FULL ref, not GITHUB_REF_NAME: the short name strips the
          # refs/heads vs refs/tags prefix, so a tag literally named "master"
          # would satisfy a name-only check and bypass the production gate.
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Production deploy must run from refs/heads/master (got ${GITHUB_REF})"; exit 1
          fi

  qa-before-deploy:
    name: QA before deploy
    needs: validate-production-ref
    uses: ./.github/workflows/full-suite.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
      statuses: write
    secrets: inherit

  deploy:
    name: Deploy
    needs: qa-before-deploy
    # A reusable workflow cannot ELEVATE permissions — the caller job's grant is
    # the ceiling for every job inside _deploy-ecs-core.yml. This must be the
    # UNION of what the engine needs: id-token (OIDC->AWS), packages:read (GHCR),
    # and issues:write for the post-deploy-smoke failure reporter sub-job.
    permissions:
      id-token: write
      contents: read
      packages: read
      issues: write
    uses: ./.github/workflows/_deploy-ecs-core.yml
    with:
      image_tag: ${{ inputs.image_tag }}
      allow_rollback: ${{ inputs.allow_rollback }}
    secrets: inherit
