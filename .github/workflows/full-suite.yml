# Full Suite — on-demand caller for CI, SaaS release verification, then E2E.
#
# Dispatch from any branch: Actions → "Full Suite (CI + Release Gates + E2E)"
# → Run workflow → pick the branch. E2E runs only if the CI gate (format, lint,
# typecheck, design, unit tests, build) and SaaS release-time build verification
# pass first.
#
# Reuses existing workflows via workflow_call — no job logic is duplicated here;
# this file only orders the SaaS release-prep gates. Community self-hosted image
# verification lives in build-verify-selfhosted.yml and runs independently.

name: Full Suite (CI + Release Gates + E2E)

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  # Include the workflow name so a workflow_call invocation (where github.workflow
  # is the caller's name, e.g. the production deploy) does not share a group with a
  # manual workflow_dispatch on the same ref and silently cancel an in-flight deploy.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Gate
    # Nested reusable workflows cannot elevate permissions past this job's
    # ceiling. Mirror ci.yml's requested token scopes explicitly so callers of
    # full-suite can validate the complete workflow graph at startup.
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    uses: ./.github/workflows/ci.yml
    # Release/full-suite path runs the full heavy test matrix. A reusable
    # workflow inherits the caller's originating event, so this must be an
    # explicit input — `github.event_name` is never `workflow_call` downstream.
    with:
      run_heavy_tests: true
    secrets: inherit

  build-verify:
    name: Build & Boot Check
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-verify.yml
    # No `secrets: inherit` — build-verify.yml only uses GITHUB_TOKEN (GHCR
    # login), which every called workflow gets automatically. Inheriting the full
    # secret set here would over-scope it (least-privilege).

  e2e:
    name: E2E Suite
    needs: [ci, build-verify]
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # Red-run fail-fast: once the CI gate and prod-image boot check have both
  # completed and either failed, nothing downstream can succeed — cancel the
  # whole run so expensive sibling jobs in the caller (e.g. the ~15-minute
  # Self-Hosted Build Verify in docker-publish.yml, which shares this run_id)
  # stop burning runners. `needs` waits for ALL listed jobs to finish, so every
  # test shard still reports its result before this fires — no failure
  # visibility is lost. On green runs `if: failure()` skips this job entirely.
  # Trade-off: the run's overall conclusion becomes "cancelled" instead of
  # "failure"; the failed jobs themselves still show red.
  cancel-doomed-run:
    name: Cancel doomed run
    needs: [ci, build-verify]
    if: failure()
    # Cancelling a run needs actions:write. A reusable workflow cannot elevate
    # past its caller's job grant, so every caller of full-suite.yml must also
    # grant actions:write on its job (docker-publish.yml, deploy-ecs.yml).
    permissions:
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel this run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run cancel ${{ github.run_id }} --repo "${GITHUB_REPOSITORY}"
