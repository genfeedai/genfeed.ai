# Build Verify (Self-Hosted) — builds the community all-in-one image, then boots
# it and runs the LOCAL-mode release specs against it before release/full-suite
# publishes, without slowing every pull request.
# Mirror of build-verify.yml, but targets docker/Dockerfile.selfhosted (Redis +
# NestJS services + Next.js in one container) instead of the microservice image.
#
# Why this exists: the self-hosted image is published ONLY on `release: published`
# (see docker-publish.yml). A break in Dockerfile.selfhosted (a missing apt
# package, a failed `bun.sh` install) OR a runtime break (the image boots but does
# not serve LOCAL mode cleanly — e.g. `/` fails to redirect to the seeded
# workspace, #1450) should be caught while cutting a release, but not paid on
# every PR. Building alone is not enough: v0.5.0 built fine and still shipped a
# broken LOCAL-mode root, red for days, because nothing booted the image before
# publish. This guard is manual/reusable so Full Suite and release prep can run
# the full build + boot + LOCAL E2E before publishing.
name: Build Verify (Self-Hosted)

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-verify-selfhosted-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: genfeed-selfhosted-verify

jobs:
  build-and-boot:
    name: Build & Boot Check (Self-Hosted)
    runs-on: ubuntu-latest
    # Fatter than the server image: builds shared packages + 4 services + a full
    # Next.js app in one shot, then boots it and runs the LOCAL-mode release
    # specs — so it needs more headroom than build-verify.yml's 20.
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      APP_BASE_URL: http://localhost:3000
      API_BASE_URL: http://localhost:3010

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Open-core boundary guard. The self-hosted image is the AGPL community build
      # and must never re-couple to the commercial-licensed ee/ source. Comment
      # prose may mention ee/ (the Dockerfile explains WHY it is excluded), so this
      # only fails on ACTIVE directives — any non-comment line that names ee/packages,
      # ee-billing, or ee-harness (a COPY, a workspace entry, a manifest path). Runs
      # before the 30-min build so a re-coupling fails in seconds.
      - name: Guard — no ee/ coupling in self-hosted build inputs
        run: |
          ACTIVE=$(grep -nE 'ee/packages|ee-billing|ee-harness' \
            docker/Dockerfile.selfhosted docker/selfhosted-entrypoint.sh \
            | grep -vE ':[[:space:]]*#' || true)
          if [ -n "$ACTIVE" ]; then
            echo "❌ Active ee/ reference in the community self-hosted build path:"
            echo "$ACTIVE"
            echo ""
            echo "The self-hosted image must stay free of commercial-licensed ee/ source."
            echo "The api resolves @billing-providers to the in-tree OSS fragment via the"
            echo "webpack alias — no ee/packages/billing copy or workspace entry is needed."
            exit 1
          fi
          echo "✅ no active ee/ reference in Dockerfile.selfhosted or entrypoint"

      - name: Log in to GHCR (for build cache)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build self-hosted image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: docker/Dockerfile.selfhosted
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          # Shares the gha cache scope with docker-publish.yml so a real release
          # publish warms this guard and vice-versa.
          cache-from: type=gha,scope=selfhosted
          cache-to: type=gha,mode=max,scope=selfhosted
          platforms: linux/amd64

      - name: Verify build outputs exist
        run: |
          echo "Checking self-hosted image contents..."
          docker run --rm --entrypoint sh ${{ env.IMAGE_NAME }}:test -c '
            set -e
            # Derive the service list from the ENTRYPOINT itself rather than a
            # hardcoded list, so the guard catches drift in either direction —
            # e.g. the entrypoint launching a service the Dockerfile never built
            # (mcp), which fails silently at runtime because it is backgrounded.
            SVCS=$(grep -oE "apps/server/dist/apps/[a-z-]+/main\.js" /entrypoint.sh | sort -u)
            test -n "$SVCS" || { echo "❌ could not parse service bundles from /entrypoint.sh"; exit 1; }
            for f in $SVCS; do
              test -f "$f" || { echo "❌ entrypoint starts $f but the image never built it"; exit 1; }
              SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
              [ "$SIZE" -ge 10000 ] || { echo "❌ $f suspiciously small (${SIZE} bytes)"; exit 1; }
              echo "  ✅ $f ($(( SIZE / 1024 ))KB)"
            done

            # Next.js build artifacts
            test -d apps/app/.next || { echo "❌ Next.js .next build missing"; exit 1; }
            echo "  ✅ Next.js .next present"

            # Runtime binaries baked into the base stage
            command -v redis-server >/dev/null || { echo "❌ redis-server missing"; exit 1; }
            command -v tini >/dev/null || { echo "❌ tini missing"; exit 1; }
            echo "  ✅ redis-server + tini present"

            # CA bundle — the exact thing whose absence broke the v0.1.x publish.
            test -f /etc/ssl/certs/ca-certificates.crt || { echo "❌ CA bundle missing"; exit 1; }
            echo "  ✅ CA bundle present"

            # Persistent runtime paths must be writable by the non-root app user.
            test -w /data/files || { echo "❌ /data/files is not writable by appuser"; exit 1; }
            test -w /data/tmp/videos || { echo "❌ /data/tmp/videos is not writable by appuser"; exit 1; }
            echo "  ✅ persistent files + temp paths writable"

            # Open-core boundary — prove the built community image carries NO ee/
            # source and no @genfeedai/ee-billing package. This is the runtime proof
            # behind the static guard: even if a future COPY slipped ee/ in, the
            # shipped image stays clean or this fails.
            test ! -e /app/ee || { echo "❌ /app/ee present — community image must not ship ee/ source"; exit 1; }
            if find /app/node_modules -maxdepth 4 -path "*@genfeedai/ee-billing*" 2>/dev/null | grep -q .; then
              echo "❌ @genfeedai/ee-billing present in node_modules — ee/ leaked into the community image"; exit 1;
            fi
            echo "  ✅ no ee/ source or @genfeedai/ee-billing package in image"

            echo ""
            echo "Self-hosted image verified ✅"
          '

      # Boot the freshly built community image end to end and run the LOCAL-mode
      # release specs against THIS build — the same suite the nightly release E2E
      # runs, but before publish instead of after. build-verify used to stop at
      # "the image builds + the bundles exist", which is exactly how a self-hosted
      # image that boots but never redirects `/` to the seeded workspace (the
      # keyless-root regression behind #1450: the fix, #1492, was cut into master
      # two days AFTER v0.5.0) sailed through this pre-publish gate and shipped
      # red for days. Booting here makes that class of regression fail BEFORE the
      # image is pushed, not in the next nightly.
      - name: Prepare compose env (LOCAL mode, pin the freshly built image)
        run: |
          set -euo pipefail
          # Retag the loaded verify image under the repo the compose file expects
          # so the stack runs THIS build with no registry pull.
          docker tag "${IMAGE_NAME}:test" "ghcr.io/${GITHUB_REPOSITORY}:selfhosted-verify"
          # Exercise the same environment template shipped in release bundles.
          # This catches optional values represented as blank strings before
          # publish, while still pinning compose to THIS locally built image.
          cp docker/.env.example docker/.env
          sed -i 's/^GENFEED_IMAGE_TAG=.*/GENFEED_IMAGE_TAG=selfhosted-verify/' docker/.env

      - name: Boot self-hosted stack + Postgres
        run: |
          docker compose --env-file docker/.env \
            -f docker/docker-compose.selfhosted.yml up -d

      # Readiness gate — the #1 false-green risk. Migrate + seed run async on
      # boot, so liveness can be green before the DB is usable. Fail loud on
      # timeout; never let the specs run against a half-booted stack.
      - name: Readiness — stage 1 (liveness, <=120s)
        run: |
          deadline=$((SECONDS + 120))
          until curl -fsS "${API_BASE_URL}/v1/health/ready" >/dev/null \
             && curl -fsS "${APP_BASE_URL}/playwright-ready" >/dev/null; do
            if (( SECONDS >= deadline )); then
              echo "::error::Liveness gate timed out after 120s — processes not answering"
              exit 1
            fi
            sleep 3
          done
          echo "Liveness OK — API + app processes answering."

      - name: Readiness — stage 2 (DB + seed + auth gate, <=180s)
        run: |
          # Poll bootstrap until it returns the SEEDED admin. This drives
          # LOCAL-mode auth injection -> Prisma -> SelfHostedSeedService rows,
          # so it only greens once DB + migrations + seed + auth are ALL live.
          deadline=$((SECONDS + 180))
          until curl -fsS "${API_BASE_URL}/v1/auth/bootstrap" | grep -q 'admin@localhost'; do
            if (( SECONDS >= deadline )); then
              echo "::error::Bootstrap/seed gate timed out after 180s — DB + migrate + seed + auth not all ready"
              exit 1
            fi
            sleep 3
          done
          echo "Bootstrap + seed OK — seeded admin@localhost reachable."

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: "1.3.14"
          install-command: "bun install"
          cache-playwright: "true"

      - name: Run LOCAL-mode release E2E specs against the freshly built image
        run: bun run test:e2e:release
        env:
          CI: true

      - name: Dump container logs (on failure)
        if: failure()
        run: |
          docker compose --env-file docker/.env \
            -f docker/docker-compose.selfhosted.yml logs --no-color > compose-logs.txt 2>&1 || true
          echo "===== compose logs (tail) ====="
          tail -n 200 compose-logs.txt || true

      - name: Upload container logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: selfhosted-verify-compose-logs
          path: compose-logs.txt
          retention-days: 14

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: selfhosted-verify-playwright-report
          path: playwright/artifacts/report/
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: |
          docker compose --env-file docker/.env \
            -f docker/docker-compose.selfhosted.yml down -v || true

      - name: Build summary
        if: success()
        run: |
          {
            echo "## ✅ Self-Hosted Build + Boot Verification Passed"
            echo ""
            echo "\`docker/Dockerfile.selfhosted\` built (no push); services, Next.js, Redis, tini, and CA bundle verified."
            echo "The freshly built image booted with Postgres in LOCAL mode and passed the release E2E specs (root redirect, health, API bootstrap/seed, workspace shell)."
          } >> "$GITHUB_STEP_SUMMARY"
