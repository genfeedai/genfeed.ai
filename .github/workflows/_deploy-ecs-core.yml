# Reusable ECS production deploy engine (workflow_call only).
#
# This is the shared deploy core for BOTH the normal release path
# (deploy-ecs.yml, gated by the full QA suite) and the admin-only emergency
# FASTLANE path (deploy-ecs-fastlane.yml, which skips QA). Keeping the engine in
# one reusable file means the two callers cannot drift.
#
# Flow: resolve server:<sha> in GHCR -> copy GHCR->ECR -> RDS pre-migration
# snapshot -> Prisma migrate task -> workflow migration/backfill task ->
# boot-smoke -> terraform apply rolls services (task defs are TF-managed with
# image_tag) -> wait services-stable -> deploy Vercel frontends -> live
# post-deploy smoke.
#
# Callers own the trigger, the master-ref gate, any pre-deploy QA gate, and the
# `deploy-ecs-production` concurrency group. This file owns only the deploy.
name: Deploy ECS core (reusable)

on:
  workflow_call:
    inputs:
      image_tag:
        description: "server image tag to deploy (default: current SHA)"
        required: false
        default: ""
        type: string
      allow_rollback:
        description: "allow deploying an image tag different from current SHA"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_DIR: infra/terraform/genfeed-prod

jobs:
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Job-level (not workflow-level) serialization. Both the normal and fastlane
    # callers reach THIS job via the reusable, and this group is shared across
    # them, so two deploys can never run the snapshot/migrate/roll sequence
    # concurrently. Critically, it lives on the deploy job — NOT the caller's
    # workflow — so a normal release sitting in its ~40-min QA gate does NOT hold
    # the lock and cannot block an emergency fastlane from starting. The fastlane
    # only contends here, at the roll, where serialization is actually required.
    concurrency:
      group: deploy-ecs-roll
      cancel-in-progress: false
    # `environment: production` scopes prod secrets/vars. NOTE: no required
    # reviewers are configured, so this is NOT a human approval gate. Deploy
    # safety comes from the dispatch-only trigger, the ref==master checks, the
    # migrate + boot-smoke pre-roll gates below, and ECS circuit-breaker
    # rollback — not manual approval.
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          # Needed when HEAD is a non-server commit: the image resolver can walk
          # recent first-parent ancestors and verify no server-image inputs
          # changed before reusing an older immutable image tag.
          fetch-depth: 50

      - name: Validate ref is master
        run: |
          # Check the FULL ref, not GITHUB_REF_NAME: the short name strips the
          # refs/heads vs refs/tags prefix, so a tag literally named "master"
          # would satisfy a name-only check and bypass the production gate.
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Production deploy must run from refs/heads/master (got ${GITHUB_REF})"; exit 1
          fi

      - name: Resolve image tag
        id: tag
        env:
          # Read the dispatch input via env (never interpolate ${{ inputs }}
          # directly into a run script — that is a template-injection sink).
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          ALLOW_ROLLBACK: ${{ inputs.allow_rollback }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="${INPUT_IMAGE_TAG:-}"
          EXPLICIT_TAG=true
          if [ -z "$TAG" ]; then
            TAG="$DEFAULT_SHA"
            EXPLICIT_TAG=false
          fi
          # The tag flows into `docker buildx imagetools` and a terraform -var;
          # restrict it to a conservative image-tag charset so a crafted input
          # cannot inject shell or terraform. (The image must also exist in GHCR,
          # which imagetools enforces downstream.)
          if ! printf '%s' "$TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::Invalid image_tag '$TAG' (allowed chars: A-Za-z0-9 . _ -)"; exit 1
          fi
          if [ "$EXPLICIT_TAG" = "true" ] && [ "$TAG" != "$DEFAULT_SHA" ] && [ "$ALLOW_ROLLBACK" != "true" ]; then
            echo "::error::Refusing to deploy non-current image tag '$TAG' from workflow SHA '$DEFAULT_SHA'. Leave image_tag empty to deploy current master, or set allow_rollback=true for an intentional rollback."; exit 1
          fi
          if [ "$TAG" != "$DEFAULT_SHA" ]; then
            echo "::warning::Deploying non-current image tag '$TAG' from workflow SHA '$DEFAULT_SHA'."
          fi
          echo "Deploying server image tag: $TAG"
          echo "sha=$TAG" >> "$GITHUB_OUTPUT"
          echo "explicit=$EXPLICIT_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR + GHCR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve available server image
        id: image
        env:
          EXPLICIT_TAG: ${{ steps.tag.outputs.explicit }}
          HEAD_SHA: ${{ github.sha }}
          REQUESTED_TAG: ${{ steps.tag.outputs.sha }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/${{ github.repository }}/server"

          image_exists() {
            docker buildx imagetools inspect "${REPO}:$1" >/dev/null 2>&1
          }

          wait_for_image() {
            local tag="$1"
            for i in $(seq 1 20); do
              if image_exists "$tag"; then
                echo "Server image ready: ${tag}"
                return 0
              fi
              if [ "$i" = "20" ]; then
                break
              fi
              echo "Server image ${tag} not ready (attempt ${i}/20); waiting 30s..."
              sleep 30
            done
            return 1
          }

          # Explicit tag (rollback / pinned deploy): it must already exist.
          # Wait in case a build is still in flight, then fail closed.
          if [ "$EXPLICIT_TAG" = "true" ]; then
            if wait_for_image "$REQUESTED_TAG"; then
              echo "sha=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Requested server image ${REQUESTED_TAG} was not found in GHCR after waiting. Build it first or choose an existing image tag."
            exit 1
          fi

          # Deploying current HEAD. Fast path: server:<HEAD> already published —
          # use it immediately with no wait loop.
          if image_exists "$REQUESTED_TAG"; then
            echo "Server image ready: ${REQUESTED_TAG}"
            echo "sha=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          server_image_paths=(
            "apps/server/**"
            "packages/**"
            "ee/**"
            "docker/Dockerfile.server"
            "bun.lock"
            "package.json"
            ".github/workflows/build-server-image.yml"
            ".github/actions/build-unified-image/**"
          )

          # No image for HEAD yet. Find the newest first-parent ancestor that has
          # an image, then branch on whether server-image inputs changed since it:
          #   unchanged -> frontend/workflow-only commit. build-server-image is
          #     paths-gated and NEVER builds a server:<HEAD> for it, so waiting
          #     would burn ~10m for an image that will never appear. Reuse the
          #     ancestor's immutable image immediately.
          #   changed   -> a server:<HEAD> build is expected/in-flight; wait for
          #     it (up to ~10m), then fail closed if it never lands.
          echo "No image for HEAD (${HEAD_SHA}); checking recent first-parent ancestors..."
          ANCESTOR=""
          for sha in $(git rev-list --first-parent -n 50 "$HEAD_SHA" | tail -n +2); do
            if image_exists "$sha"; then
              ANCESTOR="$sha"
              break
            fi
          done

          if [ -z "$ANCESTOR" ]; then
            echo "No first-parent ancestor image found; waiting for server:${HEAD_SHA}..."
            if wait_for_image "$REQUESTED_TAG"; then
              echo "sha=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No server image found for HEAD or its recent first-parent ancestors."
            exit 1
          fi

          if git diff --quiet "${ANCESTOR}..${HEAD_SHA}" -- "${server_image_paths[@]}"; then
            echo "::warning::server:${HEAD_SHA} was not built, but server-image inputs are unchanged since ${ANCESTOR}; deploying ${ANCESTOR} (no wait)."
            echo "sha=$ANCESTOR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Server-image inputs changed since ${ANCESTOR}; waiting for server:${HEAD_SHA} build..."
          if wait_for_image "$REQUESTED_TAG"; then
            echo "sha=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::server:${HEAD_SHA} was not found, and server-image inputs changed after newest available ancestor ${ANCESTOR}. Wait for the Build Server Image workflow for ${HEAD_SHA}, then re-dispatch."
          exit 1

      - name: Copy server:<sha> GHCR -> ECR (no rebuild)
        run: |
          SHA="${{ steps.image.outputs.sha }}"
          ECR="$(aws ecr describe-repositories --repository-names genfeed/server \
                 --query 'repositories[0].repositoryUri' --output text)"
          docker buildx imagetools create -t "${ECR}:${SHA}" "ghcr.io/genfeedai/genfeed.ai/server:${SHA}"

      # OpenTofu, not Terraform — state is tofu in S3; mixing the two risks a
      # state-version mismatch.
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.12.2"
          tofu_wrapper: false

      - name: Tofu init
        working-directory: ${{ env.TF_DIR }}
        run: tofu init -input=false

      - name: Register migration, workflow migration, boot-smoke + credential-backfill task definitions
        working-directory: ${{ env.TF_DIR }}
        run: |
          tofu apply -input=false -auto-approve \
            -target=aws_cloudwatch_log_group.migrate \
            -target=aws_ecs_task_definition.migrate \
            -target=aws_cloudwatch_log_group.workflow_backfill \
            -target=aws_ecs_task_definition.workflow_backfill \
            -target=aws_cloudwatch_log_group.boot_smoke \
            -target=aws_ecs_task_definition.boot_smoke \
            -target=aws_cloudwatch_log_group.credential_backfill \
            -target=aws_ecs_task_definition.credential_backfill \
            -var="image_tag=${{ steps.image.outputs.sha }}" \
            -var="enable_dns_cutover=true"

      - name: Snapshot RDS before migrations (fail-closed)
        env:
          # Source of truth: infra/terraform/genfeed-prod/data.tf (data.aws_db_instance.genfeed).
          RDS_INSTANCE_ID: genfeed-data
          # Read via env, never interpolate ${{ }} into the script body directly.
          IMAGE_SHA: ${{ steps.image.outputs.sha }}
        run: |
          set -euo pipefail
          # Fail closed: never run migrations without a fresh pre-migration snapshot.
          # Mirrors the Vitae GCP db-migrate "Create pre-migration Cloud SQL backup".
          # If create/wait fails, the job stops HERE — before the migrate task can
          # touch the database — so a bad migration is always recoverable.
          # RDS snapshot identifiers allow only letters, digits and single
          # hyphens — but the image tag charset permits '.' and '_' (e.g.
          # release_2026.06.20), which would fail-closed the snapshot and block
          # the deploy. Sanitize for the id; keep the raw tag in git_sha below.
          SAFE_SHA="$(printf '%s' "${IMAGE_SHA}" | tr '._' '-' | tr -s '-' | sed 's/-$//')"
          SNAP_ID="pre-migrate-${SAFE_SHA}-$(date -u +%Y%m%d%H%M%S)"
          echo "Creating pre-migration snapshot ${SNAP_ID} of ${RDS_INSTANCE_ID}..."
          aws rds create-db-snapshot \
            --db-instance-identifier "$RDS_INSTANCE_ID" \
            --db-snapshot-identifier "$SNAP_ID" \
            --tags "Key=purpose,Value=pre-migration" \
                   "Key=git_sha,Value=${IMAGE_SHA}" \
                   "Key=run_id,Value=${GITHUB_RUN_ID}" >/dev/null
          echo "Waiting for snapshot ${SNAP_ID} to become available..."
          aws rds wait db-snapshot-available --db-snapshot-identifier "$SNAP_ID"
          echo "Pre-migration snapshot ready: ${SNAP_ID}"

      - name: Run DB migrations (one-off task, gated before services roll)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          CLUSTER=$(tofu output -raw cluster_name)
          TASK_DEFINITION=$(tofu output -raw migrate_task_definition_arn)
          SUBNETS=$(tofu output -json task_subnets | jq -r 'join(",")')
          SG=$(tofu output -raw task_security_group)
          echo "Running migrate task on $CLUSTER ($TASK_DEFINITION)..."
          # FARGATE — the cluster is Fargate-only (no EC2 capacity); assignPublicIp
          # DISABLED since tasks egress via NAT from the private subnets.
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          # run-task emits the literal "None" when the tasks[] array is empty
          # (capacity / IAM / quota failure). Guard so we fail with an actionable
          # message instead of a cryptic "wait" parameter-validation error.
          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::ECS run-task launched no migrate task (capacity, IAM, or quota failure)"; exit 1
          fi
          # Bound the wait: bare 'aws ecs wait tasks-stopped' polls silently for
          # up to ~10 min then fails opaquely. Poll describe-tasks with a deadline
          # and surface lastStatus / stoppedReason for fast diagnosis.
          DEADLINE=$((SECONDS + 900))
          while :; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            [ "$STATUS" = "STOPPED" ] && break
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              echo "::error::migrate task did not stop within 10m (last status: $STATUS, reason: $REASON)"; exit 1
            fi
            echo "  migrate task status: $STATUS ($((DEADLINE - SECONDS))s remaining)"
            sleep 6
          done
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migrate exit code: $CODE"
          [ "$CODE" = "0" ] || { echo "::error::migration failed"; exit 1; }

      - name: Run workflow migration/backfill (one-off task, gated before services roll)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          CLUSTER=$(tofu output -raw cluster_name)
          TASK_DEFINITION=$(tofu output -raw workflow_backfill_task_definition_arn)
          SUBNETS=$(tofu output -json task_subnets | jq -r 'join(",")')
          SG=$(tofu output -raw task_security_group)
          echo "Running workflow backfill task on $CLUSTER ($TASK_DEFINITION)..."
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::ECS run-task launched no workflow backfill task (capacity, IAM, or quota failure)"; exit 1
          fi
          DEADLINE=$((SECONDS + 1200))
          while :; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            [ "$STATUS" = "STOPPED" ] && break
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              echo "::error::workflow backfill task did not stop within 20m (last status: $STATUS, reason: $REASON)"; exit 1
            fi
            echo "  workflow backfill task status: $STATUS ($((DEADLINE - SECONDS))s remaining)"
            sleep 6
          done
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "workflow backfill exit code: $CODE"
          [ "$CODE" = "0" ] || { echo "::error::workflow backfill failed"; exit 1; }

      - name: Boot smoke — verify new image boots (gated before services roll)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          # Run the api as a one-off task and require localhost /v1/health to
          # answer. This catches both crash-on-boot failures and "loads but never
          # binds the port" failures before any service rolls.
          CLUSTER=$(tofu output -raw cluster_name)
          TASK_DEFINITION=$(tofu output -raw boot_smoke_task_definition_arn)
          SUBNETS=$(tofu output -json task_subnets | jq -r 'join(",")')
          SG=$(tofu output -raw task_security_group)
          echo "Running boot smoke on $CLUSTER ($TASK_DEFINITION)..."
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          # run-task emits the literal "None" when the tasks[] array is empty
          # (capacity / IAM / quota failure). Guard so we fail with an actionable
          # message instead of a cryptic "wait" parameter-validation error.
          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::ECS run-task launched no boot-smoke task (capacity, IAM, or quota failure)"; exit 1
          fi
          # Bound the wait: bare 'aws ecs wait tasks-stopped' polls silently for
          # up to ~10 min then fails opaquely. Poll describe-tasks with a deadline
          # and surface lastStatus / stoppedReason for fast diagnosis.
          DEADLINE=$((SECONDS + 600))
          while :; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            [ "$STATUS" = "STOPPED" ] && break
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" \
                --reason "deploy boot-smoke timed out before rollout" >/dev/null || true
              echo "::error::boot smoke task did not stop within 15m (last status: $STATUS, reason: $REASON)"; exit 1
            fi
            echo "  boot smoke task status: $STATUS ($((DEADLINE - SECONDS))s remaining)"
            sleep 6
          done
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "boot smoke exit code: $CODE"
          [ "$CODE" = "0" ] || { echo "::error::API failed to boot (crash-on-boot) — aborting before rolling services"; exit 1; }

      - name: Tofu apply (roll services to new image)
        working-directory: ${{ env.TF_DIR }}
        run: tofu apply -input=false -auto-approve -var="image_tag=${{ steps.image.outputs.sha }}" -var="enable_dns_cutover=true"

      - name: Wait for services stable
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          CLUSTER=$(tofu output -raw cluster_name)
          for svc in $(tofu output -json service_names | jq -r '.[]'); do
            echo "waiting: $svc"
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$svc"
          done
          echo "All services stable."

      - name: Run credential-encryption backfill (post-rollout, gated after services stable)
        # NON-BLOCKING: this is post-rollout data hygiene (encrypting legacy plaintext
        # credential secrets at rest). It runs AFTER services are stable, and its failure
        # must NOT gate the Vercel frontend deploy or fail the whole production deploy —
        # otherwise a backfill hiccup leaves prod backend/frontend out of sync. The
        # encrypt-on-write boundary already protects all NEW writes, and these rows were
        # plaintext before this deploy, so deferring the at-rest backfill does not regress
        # security. Tracked follow-up: the task currently runs a loose source .ts
        # (apps/server/api/scripts/backfill-credential-encryption.ts) that is NOT shipped
        # in the compiled prod image — it needs a compiled build target (like
        # api-workflow-backfill) before it can succeed. See follow-up issue.
        # ORDERING: runs AFTER services are stable — only the new app code can read the
        # ciphertext it writes. Idempotent: rows already in ciphertext are skipped.
        id: credential_backfill
        continue-on-error: true
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          CLUSTER=$(tofu output -raw cluster_name)
          TASK_DEFINITION=$(tofu output -raw credential_backfill_task_definition_arn)
          SUBNETS=$(tofu output -json task_subnets | jq -r 'join(",")')
          SG=$(tofu output -raw task_security_group)
          echo "Running credential-encryption backfill task on $CLUSTER ($TASK_DEFINITION)..."
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::ECS run-task launched no credential backfill task (capacity, IAM, or quota failure)"; exit 1
          fi
          DEADLINE=$((SECONDS + 1200))
          while :; do
            STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            [ "$STATUS" = "STOPPED" ] && break
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              REASON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --query 'tasks[0].stoppedReason' --output text)
              aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" \
                --reason "deploy credential-encryption backfill timed out" >/dev/null || true
              echo "::error::credential backfill task did not stop within 20m (last status: $STATUS, reason: $REASON)"; exit 1
            fi
            echo "  credential backfill task status: $STATUS ($((DEADLINE - SECONDS))s remaining)"
            sleep 6
          done
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "credential backfill exit code: $CODE"
          [ "$CODE" = "0" ] || { echo "::error::credential-encryption backfill failed"; exit 1; }

      # The backfill above is intentionally non-blocking (continue-on-error), so a
      # failure would otherwise look identical to a green deploy. Surface a loud,
      # distinct signal (annotation + job summary) without failing the deploy so an
      # operator knows to re-run it. Tracked in #1044.
      - name: Alert on credential-backfill failure (non-blocking)
        if: steps.credential_backfill.outcome == 'failure'
        run: |
          echo "::error title=Credential-encryption backfill failed::Post-rollout credential-encryption backfill did NOT complete. Deploy was not blocked (by design); new writes are still encrypted, but legacy at-rest rows were not backfilled this run. Re-run once fixed — see #1044."
          {
            echo "### ⚠️ Credential-encryption backfill FAILED (non-blocking)"
            echo ""
            echo "The post-rollout credential-encryption backfill step failed. The production deploy was **not** blocked (by design), but legacy plaintext credential rows were **not** encrypted at rest this run."
            echo ""
            echo "- Encrypt-on-write still protects all new writes."
            echo "- Re-run the backfill once the task is fixed. Tracked in #1044."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-vercel-frontends:
    name: Deploy Vercel frontends
    needs: deploy
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-vercel-frontends.yml
    secrets: inherit

  post-deploy-smoke:
    name: Post-deploy smoke
    needs: deploy-vercel-frontends
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Smoke live production endpoints
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/post-deploy-smoke"

          smoke_url() {
            local name="$1"
            local url="$2"
            local expected="${3:-}"
            local body="${RUNNER_TEMP}/post-deploy-smoke/${name}.body"

            echo "Checking ${name}: ${url}"
            curl --fail --show-error --silent --location \
              --retry 6 --retry-delay 10 --retry-all-errors \
              --connect-timeout 10 --max-time 20 \
              --output "${body}" \
              "${url}"

            if [ -n "${expected}" ] && ! grep -Fq "${expected}" "${body}"; then
              echo "::error::${name} response did not include expected marker: ${expected}"
              echo "Response tail:"
              tail -c 1200 "${body}" || true
              exit 1
            fi

            {
              echo "- ${name}: ${url}"
            } >> "${RUNNER_TEMP}/post-deploy-smoke/summary.md"
          }

          smoke_url api-ready "https://api.genfeed.ai/v1/health/ready" '"status":"ready"'
          smoke_url mcp-health "https://mcp.genfeed.ai/v1/health" '"status":"ok"'
          smoke_url notifications-health "https://notifications.genfeed.ai/v1/health" '"status":"ok"'
          smoke_url app-login "https://app.genfeed.ai/login"
          smoke_url website-home "https://genfeed.ai"
          smoke_url docs-home "https://docs.genfeed.ai"

          {
            echo "## Post-deploy smoke"
            echo ""
            cat "${RUNNER_TEMP}/post-deploy-smoke/summary.md"
            echo ""
            echo "Ref: \`${GITHUB_REF}\`"
            echo "SHA: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  report-post-deploy-smoke-failure:
    name: Report post-deploy smoke failure
    needs: post-deploy-smoke
    if: always() && needs.post-deploy-smoke.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v8
        with:
          script: |
            const label = 'post-deploy-smoke';
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Post-deploy smoke failed - ${date}`;
            const body = [
              `**Post-deploy production smoke failed** on \`${date}\`.`,
              ``,
              `- Failed run: ${runUrl}`,
              `- Ref: \`${context.ref}\``,
              `- SHA: \`${context.sha}\``,
              ``,
              `Checked endpoints:`,
              `- https://api.genfeed.ai/v1/health/ready`,
              `- https://mcp.genfeed.ai/v1/health`,
              `- https://notifications.genfeed.ai/v1/health`,
              `- https://app.genfeed.ai/login`,
              `- https://genfeed.ai`,
              `- https://docs.genfeed.ai`,
              ``,
              `This means the production deploy completed but the live public surface did not pass smoke verification.`,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'b60205',
                description: 'Production post-deploy smoke failures',
              });
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body,
              });
              core.info(`Commented on existing post-deploy smoke issue #${number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
            });
            core.info(`Created post-deploy smoke issue #${created.data.number}`);
