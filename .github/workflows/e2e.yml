name: E2E Tests

on:
  workflow_dispatch:
  # E2E always runs on develop: on every push to develop and on every PR
  # targeting it, so the suite is the canonical gate on the integration branch
  # instead of being run ad-hoc on local machines.
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # API E2E Tests — test infrastructure incomplete, non-blocking until ready
  e2e-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: genfeed
          POSTGRES_PASSWORD: genfeed_local
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://genfeed:genfeed_local@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      # Mock all external service keys
      REPLICATE_API_TOKEN: test-mock-key
      STRIPE_SECRET_KEY: test-mock-key
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'test-mock-clerk-key' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bunx turbo run build --filter="./packages/*"

      # Provision the schema on the ephemeral Postgres service container.
      # The E2E suite assumes a migrated DB (it truncates + reseeds per test,
      # it does not create the schema itself).
      - name: Apply Prisma migrations to test DB
        run: bunx prisma migrate deploy
        working-directory: packages/prisma

      - name: Run API E2E smoke tests
        run: bun run --cwd apps/server/api test:e2e:ci
        env:
          NODE_ENV: test

      - name: Upload E2E coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: api-e2e
          fail_ci_if_error: false

  e2e-frontend:
    name: Frontend Core E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: bunx turbo run build --filter=@genfeedai/app
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'test-mock-clerk-key' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZW5nYWdlZC1wYW50aGVyLTcxLmNsZXJrLmFjY291bnRzLmRldiQ' }}
          NEXT_PUBLIC_API_URL: http://localhost:3010

      - name: Run core E2E tests
        run: bun run test:e2e:core
        env:
          CI: true
          APP_BASE_URL: http://localhost:3000
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'test-mock-clerk-key' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZW5nYWdlZC1wYW50aGVyLTcxLmNsZXJrLmFjY291bnRzLmRldiQ' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright/artifacts/report/
          retention-days: 7

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: playwright/artifacts/results/
          retention-days: 7

      - name: Upload screenshot diffs (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshot-diffs
          path: |
            playwright/e2e/tests/__screenshots__/
            playwright/artifacts/results/
            playwright/artifacts/screenshots/
          retention-days: 7
