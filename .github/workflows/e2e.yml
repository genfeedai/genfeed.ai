name: E2E Tests

on:
  workflow_dispatch:
  # Allow the suite to be run as a reusable workflow (e.g. by full-suite.yml,
  # which runs it after the CI gate passes). Secrets are inherited from caller.
  workflow_call:
  schedule:
    - cron: "17 2 * * *" # Nightly 02:17 UTC

# Include the workflow name in the group so a full-suite.yml workflow_call on the
# same ref does not cancel the weekly cron run of this workflow (and vice versa).
# The `e2e-` prefix is REQUIRED — same reason as ci.yml. `github.workflow`
# resolves to the top-level workflow name inside a `workflow_call`, so without a
# distinct prefix this group collides with the caller (full-suite.yml → the
# production deploy) that uses the same `${{ github.workflow }}-${{ github.ref }}`
# shape. On the deploy path E2E runs UNDER full-suite; both computed the same
# group with cancel-in-progress, so the nested E2E cancelled itself at startup
# (0 jobs) and failed the deploy. The prefix keeps E2E dedup while never matching
# a caller group.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Static route-coverage gate — fast, deterministic, no app build required.
  # Fails if dedicated route coverage drops below threshold (default 80%).
  e2e-route-coverage:
    name: E2E Route Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Check route coverage
        run: node scripts/e2e-route-coverage.mjs

  # API E2E Tests — boot/smoke gate for the real API test graph.
  # The #702 blockers are resolved in-source: E2ETestModule provides the
  # files client mock, API E2E resolves the OSS billing provider alias, and the
  # payment integration spec uses the canonical subscription DI token.
  e2e-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: genfeed
          POSTGRES_PASSWORD: genfeed_local
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://genfeed:genfeed_local@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      # Mock all external service keys
      REPLICATE_API_TOKEN: test-mock-key
      STRIPE_SECRET_KEY: test-mock-key
      BETTER_AUTH_SECRET: test-better-auth-secret
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: "1.3.14"
          install-command: "bun install"

      - name: Build packages
        run: bunx turbo run build --filter="./packages/*"

      # Provision the schema on the ephemeral Postgres service container.
      # The E2E suite assumes a migrated DB (it truncates + reseeds per test,
      # it does not create the schema itself).
      - name: Apply Prisma migrations to test DB
        run: bun x prisma migrate deploy
        working-directory: packages/prisma

      - name: Run API E2E smoke tests
        run: bun run --cwd apps/server/api test:e2e:ci
        env:
          NODE_ENV: test

      - name: Upload E2E coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: api-e2e
          fail_ci_if_error: false

  # Frontend Core E2E — sharded 4-way. The CI "core" scope is only ~7 spec files
  # (smoke/ + core/ + one shell contract; see scripts/e2e-sharded.mjs), whose
  # actual test time is ~1 min. 12 shards spun up 12 VMs — 12 installs, 12 app
  # builds, 12 independent flake dice — for that ~1 min of work, and each job
  # rolls the ffmpeg/browser/timing dice that, via cancel-doomed-run, can cancel
  # the whole deploy. 4 shards (~2 files each) is the right balance: ~2 min more
  # test wall on a gate whose CI stage already takes 20+ min, minus 8 flake
  # sources from the deploy AND-gate. Each shard is independent (fail-fast:false),
  # so "Re-run failed jobs" carries the green shards forward unchanged.
  e2e-frontend:
    name: Frontend E2E (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: "1.3.14"
          cache-playwright: "true"

      - name: Build app
        run: bunx turbo run build --filter=@genfeedai/app
        env:
          # Build the app in Playwright test mode. This NEXT_PUBLIC_* flag is
          # inlined at build time and is the master switch for the proxy.ts auth
          # bypass (middleware can't read a plain server env at request time on
          # edge) and disables live sockets (use-socket-manager).
          NEXT_PUBLIC_PLAYWRIGHT_TEST: "true"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}
          # Correct var name (app reads NEXT_PUBLIC_API_ENDPOINT, not _API_URL).
          # NEXT_PUBLIC_* is inlined at build time. Point at the prod host the
          # api-interceptor mocks; localhost:3010 is NOT intercepted.
          NEXT_PUBLIC_API_ENDPOINT: https://api.genfeed.ai/v1

      - name: Run core E2E shard ${{ matrix.shard }}/4
        # --reporter=blob (passed inline, overriding the config reporter) so the
        # merge job can stitch all shards into one HTML report. The helper keeps
        # local and CI sharding behavior identical.
        run: bun run test:e2e:sharded -- --reporter=blob
        env:
          CI: true
          APP_BASE_URL: http://localhost:3000
          E2E_EXPECT_TIMEOUT_MS: "15000"
          # Retry policy is split by trigger, and E2E_RETRIES is now the SINGLE
          # source of truth (playwright.config.ts reads it directly;
          # scripts/e2e-sharded.mjs no longer injects a competing --retries=0).
          #  - deploy/dispatch/full-suite path → 2: this suite gates the whole
          #    production release via cancel-doomed-run, so one browser/timing
          #    flake would otherwise cancel the deploy. Playwright only retries on
          #    failure, so green shards pay zero cost.
          #  - nightly cron (schedule) → 0: retries there would mask flake and
          #    silence the alarm the nightly exists to raise. Keep it honest.
          # Written as `!= 'schedule' && '2' || '0'` on purpose: GitHub Actions
          # coerces the string '0' to falsy, so a `== 'schedule' && '0' || '2'`
          # form would wrongly yield 2 for the nightly. Keeping '0' in the `||`
          # fallback position (never the `&&` result) sidesteps that coercion.
          E2E_RETRIES: ${{ github.event_name != 'schedule' && '2' || '0' }}
          E2E_SHARD_INDEX: ${{ matrix.shard }}
          E2E_TOTAL_SHARDS: "4"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}

      - name: Upload blob report (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v7
        # Always upload so the merge job has every shard, even failed ones.
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # Merge the per-shard blob reports into a single browsable HTML report.
  e2e-merge-reports:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [e2e-frontend]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: "1.3.14"
          cache-turbo: "false"

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports/

      - name: Merge into HTML report
        run: bunx playwright merge-reports --reporter=html,github ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 7

  # Gate aggregator — the single job that represents the E2E suite's pass/fail.
  # Fails if route coverage fails OR any frontend shard failed OR was cancelled
  # (a cancelled shard means it hung/timed out — surface it, never silently pass).
  e2e-gate:
    name: E2E Gate (all shards)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [e2e-route-coverage, e2e-frontend, e2e-api]
    if: always()
    steps:
      - name: Check shard results
        run: |
          echo "Route coverage: ${{ needs.e2e-route-coverage.result }}"
          echo "Frontend matrix: ${{ needs.e2e-frontend.result }}"
          echo "API E2E: ${{ needs.e2e-api.result }}"
          if [[ "${{ needs.e2e-route-coverage.result }}" == "failure" ]]; then
            echo "Route coverage gate failed" && exit 1
          fi
          if [[ "${{ needs.e2e-frontend.result }}" == "failure" || \
                "${{ needs.e2e-frontend.result }}" == "cancelled" ]]; then
            echo "One or more E2E shards failed or were cancelled" && exit 1
          fi
          if [[ "${{ needs.e2e-api.result }}" == "failure" || \
                "${{ needs.e2e-api.result }}" == "cancelled" ]]; then
            echo "API E2E boot gate failed or was cancelled" && exit 1
          fi
          echo "All required E2E checks passed."

  # Real-Better Auth authenticated smoke (Playwright `app-authed` project). Exercises
  # the GENUINE authMiddleware path via a real Better Auth test-instance session — no
  # proxy.ts bypass — so it must be built with a REAL Better Auth client (bypass flag
  # OFF) and given the real test-instance secrets. Dormant + non-blocking until
  # the secrets land: gated behind the E2E_AUTHED_ENABLED repo variable and
  # continue-on-error, so it never affects the gate while it hardens. mac-studio
  # already runs this path locally; this makes CI ready to trigger on demand.
  e2e-frontend-authed:
    name: Frontend Authed E2E (real Better Auth)
    if: ${{ vars.E2E_AUTHED_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: "1.3.14"
          install-command: "bun install"
          cache-playwright: "true"

      - name: Check authed E2E secrets
        id: authed_secrets
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          E2E_BETTER_AUTH_SESSION_TOKEN: ${{ secrets.E2E_BETTER_AUTH_SESSION_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "${BETTER_AUTH_SECRET:-}" ]; then
            missing+=("BETTER_AUTH_SECRET")
          fi
          if [ -z "${E2E_BETTER_AUTH_SESSION_TOKEN:-}" ]; then
            missing+=("E2E_BETTER_AUTH_SESSION_TOKEN")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Authed E2E Skipped"
              echo ""
              echo "Missing GitHub Actions secret(s): ${missing[*]}."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Build app (real Better Auth client, bypass OFF)
        if: steps.authed_secrets.outputs.ready == 'true'
        run: bunx turbo run build --filter=@genfeedai/app
        env:
          # CRUCIAL: build with the bypass flag OFF so the app uses the real
          # Better Auth browser session path. NEXT_PUBLIC_* is inlined at build
          # time, so this MUST be set here — not just at runtime.
          NEXT_PUBLIC_PLAYWRIGHT_TEST: "false"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}
          # Correct var name (app reads NEXT_PUBLIC_API_ENDPOINT, not _API_URL).
          NEXT_PUBLIC_API_ENDPOINT: https://api.genfeed.ai/v1

      - name: Run authed E2E (Better Auth setup + app-authed)
        if: steps.authed_secrets.outputs.ready == 'true'
        run: bun run test:e2e:authed
        env:
          CI: true
          APP_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_PLAYWRIGHT_TEST: "false"
          # Unlocks the better-auth-setup + app-authed projects in
          # playwright.config.ts, which gate on process.env.E2E_AUTHED_ENABLED.
          # The job-level `if` checks the GitHub repo var; this plumbs the value
          # into the runner process so --project=app-authed actually resolves.
          E2E_AUTHED_ENABLED: "1"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}
          E2E_BETTER_AUTH_SESSION_TOKEN: ${{ secrets.E2E_BETTER_AUTH_SESSION_TOKEN }}

      - name: Upload authed Playwright report
        uses: actions/upload-artifact@v7
        if: always() && steps.authed_secrets.outputs.ready == 'true'
        with:
          name: playwright-report-authed
          path: playwright/artifacts/report/
          retention-days: 7

      - name: Upload authed traces (on failure)
        uses: actions/upload-artifact@v7
        if: failure() && steps.authed_secrets.outputs.ready == 'true'
        with:
          name: playwright-traces-authed
          path: playwright/artifacts/results/
          retention-days: 7
