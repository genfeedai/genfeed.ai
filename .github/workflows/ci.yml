name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    # `labeled`/`unlabeled` on top of the defaults so adding/removing the
    # `full-suite` label re-runs CI (flipping a PR between focused and full
    # tests) without needing a new push.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  # Allow this gate to be run as a reusable workflow (e.g. by full-suite.yml,
  # which chains CI → E2E on demand). Secrets are inherited.
  workflow_call:
    inputs:
      run_heavy_tests:
        # Gate for the heavy test matrix (packages, server services,
        # web/desktop/mobile, extensions, app + api shards). Callers on the
        # release path (full-suite.yml) pass `true` to run the full suite.
        #
        # This is an explicit input — NOT a `github.event_name == 'workflow_call'`
        # check — because a reusable workflow inherits the CALLER's originating
        # event (e.g. `workflow_dispatch` from deploy-ecs.yml), so `event_name`
        # is never `workflow_call` here and the old gate silently skipped every
        # heavy test job on the release QA path.
        description: 'Run the full heavy test matrix (release QA path).'
        type: boolean
        required: false
        default: false

# The `ci-` prefix is REQUIRED. `github.workflow` resolves to the top-level
# workflow name even inside a `workflow_call`, so without a distinct prefix this
# group collides with a caller that uses the same `${{ github.workflow }}-${{
# github.ref }}` shape (full-suite.yml → deploy-ecs.yml). On the release/deploy
# path `ci` runs UNDER full-suite, both computed the same group with
# cancel-in-progress, and the nested `ci` cancelled itself at startup (0 jobs) —
# tripping cancel-doomed-run and silently killing every production deploy. The
# prefix keeps push-CI dedup ("ci-CI-<ref>") while never matching a caller group.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TZ: UTC

jobs:
  trust:
    name: Trust Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      is-trusted: ${{ steps.non_pr.outputs.trusted || steps.check.outputs.trusted }}
    steps:
      - name: Allow non-PR events
        id: non_pr
        if: github.event_name != 'pull_request'
        run: echo "trusted=true" >> "$GITHUB_OUTPUT"

      - name: Check contributor trust
        id: check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const association = pr.author_association;
            const trustedRoles = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isSameRepository =
              pr.head.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const isTrusted = isSameRepository || trustedRoles.includes(association);
            const hasLabel = pr.labels.some(l => l.name === 'run-ci');

            if (isTrusted) {
              const trustReason = isSameRepository
                ? 'same-repo PR'
                : `trusted contributor (${association})`;
              core.info(`${trustReason} - CI allowed`);
              core.setOutput('trusted', 'true');
            } else if (hasLabel) {
              core.info('External contributor with run-ci label - CI allowed');
              core.setOutput('trusted', 'true');
            } else {
              core.setOutput('trusted', 'false');
              core.setFailed(
                `External contributor (${association}) - add the \`run-ci\` label to allow CI. ` +
                'A maintainer must review the code and add the label.'
              );
            }

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    # gitleaks-action does not support the `release` event ("The [release] event is
    # not yet supported") and hard-fails on it. Release-triggered runs (self-hosted
    # publish) skip it — the same commit was already secret-scanned on push to master.
    if: needs.trust.outputs.is-trusted == 'true' && github.event_name != 'release'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  secretlint:
    name: Secretlint (changed files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" HEAD | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|yml|yaml|toml|sh|env.*)$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|yml|yaml|toml|sh|env.*)$' || true)
          fi
          if [ -z "$FILES" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No scannable files changed"
          else
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Scanning $(echo "$FILES" | wc -l | xargs) files"
          fi

      - name: Setup Bun environment
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Run secretlint on changed files
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs bunx secretlint
        timeout-minutes: 5

  react-doctor:
    name: React Health Check
    runs-on: ubuntu-latest
    needs: trust
    # Keep React Doctor in the main CI trust boundary. The old standalone
    # workflow duplicated checkout/setup overhead and the previous base-ref guard
    # skipped ordinary master PRs.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && (
        github.event_name == 'push'
        || github.event_name == 'workflow_call'
        || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect React changes
        id: react_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No parent commit available; running React Doctor"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD)"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$CHANGED_FILES" | grep -E '^(apps/(app|website|docs|desktop|mobile|extensions)|packages/(ui|hooks|contexts|providers|pages|workflows|agent))/' >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No React surface changes detected"
          fi

      - name: Setup Bun environment
        if: steps.react_changes.outputs.changed == 'true'
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Run React Doctor
        if: steps.react_changes.outputs.changed == 'true'
        run: |
          BASE="${{ steps.react_changes.outputs.base }}"

          if [ -n "$BASE" ]; then
            CHANGED_FILES="${RUNNER_TEMP:-/tmp}/react-doctor-changed-files.txt"
            git diff --name-only --diff-filter=ACMR "$BASE" HEAD \
              | grep -E '^(apps/(app|website|docs|desktop|mobile|extensions)|packages/(ui|hooks|contexts|providers|pages|workflows|agent))/' \
              > "$CHANGED_FILES" || true

            if [ ! -s "$CHANGED_FILES" ]; then
              echo "No React source files to scan"
              exit 0
            fi

            REACT_DOCTOR_BASE_SHA="$BASE" bunx react-doctor@0.5.6 . --blocking error --project '*' --changed-files-from "$CHANGED_FILES"
          else
            bunx react-doctor@0.5.6 . --blocking error --project '*' --diff false
          fi

  # Consolidated static guards — these four checks each do ~10-20s of actual
  # work but previously ran as four separate jobs, each paying a full
  # checkout + bun install (~2 min) on its own runner. Merged into one job they
  # share a single setup, cutting ~3 runners (~6-8 runner-min) per run with no
  # critical-path impact (they sit well under the test jobs). None of these are
  # required status checks, so collapsing their individual names is safe.
  # React Doctor is intentionally NOT folded in: it skips on draft PRs and runs
  # its own diff-detection, so its trigger semantics differ from these always-on
  # guards.
  guards:
    name: Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - name: Architecture Guards
        run: bun run check:architecture
      - name: Runtime Complexity
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            echo "No parent commit available; skipping changed-file runtime complexity guard"
            exit 0
          fi
          bun run check:runtime-complexity -- --base "$BASE"
      - name: Runtime Complexity Fixtures
        run: bunx vitest run --config scripts/architecture/vitest.config.ts check-runtime-complexity.test.ts
      - name: DI Value Imports
        run: bun run check:di-value-imports
      - name: Desktop Schema Drift
        run: bun run check:desktop-schema-drift
      - name: Serializer Drift Regression Tests
        run: bunx vitest run --config scripts/serializer-drift/vitest.config.ts
      - name: Serializer Drift
        run: bun run check:serializer-drift
      - name: SQL Risk Audit
        run: bun run audit:api:sql:ci
      - name: UI Guards
        run: bun run check:ui-guards
      - name: Design System
        run: bun run design:check
      - name: Public Package Manifests
        run: bun run check:public-packages
      - name: Package Release Scripts
        run: bunx vitest run --config scripts/package-release/vitest.config.ts
      - name: CI Workflow Contract
        run: node --test scripts/ci/tests-gate.test.mjs
      # Fail the build if the committed Prisma model metadata (enum-field-map)
      # has drifted from schema.prisma — soft-delete filtering + enum
      # normalization under the Prisma 7 driver adapter depend on it, and it
      # previously had zero CI enforcement (silent-regression risk).
      - name: Prisma model metadata drift
        run: bun run --filter=@genfeedai/prisma check:model-metadata

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run lint --affected
          else
            bun run lint
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run typecheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run type-check --affected
            # ee-billing type-checks apps/server/api sources through @api/* TS path
            # aliases, a coupling invisible to --affected's package graph (see #1105).
            # Run it explicitly; its turbo.json $TURBO_ROOT$ inputs keep this a cache
            # hit unless the aliased backend sources actually changed.
            bunx turbo run type-check --filter=@genfeedai/ee-billing
          else
            bun run type-check
          fi

  # Heavy test jobs run only on the on-demand full-suite path. full-suite.yml
  # invokes this workflow via `uses:` (workflow_call), so the gate must check for
  # 'workflow_call' — NOT 'workflow_dispatch' (which this workflow never
  # registers as a trigger; a dispatch gate left every test job permanently
  # unreachable, including on the full-suite run). Fast PR/master-push checks
  # (format, lint, typecheck, design, build) stay ungated above.
  test-scope:
    name: Test Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: trust
    # Runs on every event: workflow_call (release/full-suite), pull_request, and
    # push. The focused `*-changed` gates read `app`/`api`; full sharded matrices
    # are opt-in through release QA or the `full-suite` PR label.
    if: needs.trust.outputs.is-trusted == 'true'
    outputs:
      app: ${{ steps.scope.outputs.app }}
      api: ${{ steps.scope.outputs.api }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect app/API test scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" HEAD)

          if echo "$CHANGED_FILES" | grep -E '^(apps/app|packages/|package\.json|bun\.lock|turbo\.json|vitest\.config\.ts|\.github/workflows/ci\.yml)' >/dev/null; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

          # `ee/` is included because ee/packages/billing controllers are
          # composed into the API at build (webpack @billing-providers alias),
          # so an EE-only route change must trigger the API scope — otherwise
          # the OpenAPI spec-drift gate (openapi-drift job) would miss it.
          if echo "$CHANGED_FILES" | grep -E '^(apps/server/api|ee/|packages/|package\.json|bun\.lock|turbo\.json|vitest\.config\.ts|\.github/workflows/ci\.yml)' >/dev/null; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    # Affected-only on PRs (the run step scopes to `turbo --affected`), full on
    # the release/deploy path (run_heavy_tests).
    if: needs.trust.outputs.is-trusted == 'true' && (inputs.run_heavy_tests || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter='./packages/*' --filter='./ee/packages/*'
          else
            bunx turbo run test --filter='./packages/*' --filter='./ee/packages/*'
          fi

  test-server-services:
    name: Test Server Services
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    # Affected-only on PRs (the run step scopes to `turbo --affected`), full on
    # the release/deploy path (run_heavy_tests).
    if: needs.trust.outputs.is-trusted == 'true' && (inputs.run_heavy_tests || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run server service tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter='./apps/server/*' --filter='!@genfeedai/api'
          else
            bunx turbo run test --filter='./apps/server/*' --filter='!@genfeedai/api'
          fi

  test-web-desktop-mobile:
    name: Test Web, Desktop, Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    # Affected-only on PRs (the run step scopes to `turbo --affected`), full on
    # the release/deploy path (run_heavy_tests).
    if: needs.trust.outputs.is-trusted == 'true' && (inputs.run_heavy_tests || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run web, desktop, and mobile tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter=@genfeedai/website --filter=@genfeedai/docs --filter=@genfeedai/desktop --filter=@genfeedai/mobile
          else
            bunx turbo run test --filter=@genfeedai/website --filter=@genfeedai/docs --filter=@genfeedai/desktop --filter=@genfeedai/mobile
          fi

  test-extensions:
    name: Test Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    # Affected-only on PRs (the run step scopes to `turbo --affected`), full on
    # the release/deploy path (run_heavy_tests).
    if: needs.trust.outputs.is-trusted == 'true' && (inputs.run_heavy_tests || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run extension tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter=@genfeedai/extension-browser --filter=extension-ide
          else
            bunx turbo run test --filter=@genfeedai/extension-browser --filter=extension-ide
          fi

  test-app:
    name: Test App (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, test-scope]
    # Full sharded suite is explicit: release/deploy QA (`run_heavy_tests`) or a
    # PR carrying the `full-suite` label. Ordinary PRs use changed tests only.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && needs.test-scope.outputs.app == 'true'
      && (inputs.run_heavy_tests
        || contains(github.event.pull_request.labels.*.name, 'full-suite'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build app workspace
        run: bunx turbo run build --filter='./apps/app...'
      - name: Run app test shard
        run: cd apps/app && bunx vitest run --config ./vitest.config.mts --maxWorkers=2 --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test

  # Focused, blocking app tests on master push and every ordinary PR: runs
  # only the @genfeedai/app tests whose module graph touches the diff
  # (vitest --changed), so it stays fast while pinning any regression to the
  # single PR/merge that introduced it. Labeled PRs and the release/deploy path
  # run the full sharded `test-app` matrix above instead, which catches
  # cross-cutting tests that --changed's static graph can miss (e.g.
  # filesystem-scan contracts).
  test-app-changed:
    name: Test App (changed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [trust, test-scope]
    # Focused per-diff tests: master push (post-merge) and every PR without the
    # `full-suite` label. Labeled PRs run the full matrix, avoiding double work.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && needs.test-scope.outputs.app == 'true'
      && (github.event_name == 'push'
        || (github.event_name == 'pull_request'
          && !contains(github.event.pull_request.labels.*.name, 'full-suite')))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build app workspace
        run: bunx turbo run build --filter='./apps/app...'
      - name: Run changed app tests
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          # Force-push / new-branch pushes report an all-zero "before"; fall back
          # to the previous commit so --changed always has a valid diff base.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          echo "Running app tests changed since $BASE"
          cd apps/app && bunx vitest run --config ./vitest.config.mts \
            --maxWorkers=2 --passWithNoTests --changed "$BASE"
        env:
          NODE_ENV: test

  # Focused, blocking API tests on master push and every ordinary PR:
  # mirrors test-app-changed for apps/server/api — runs only the API tests whose
  # module graph touches the diff (vitest --changed), so it stays fast while
  # pinning any regression to the single PR/merge that introduced it. Labeled
  # PRs and the release/deploy path run the full sharded test-api matrix below
  # instead, which catches cross-cutting tests the --changed static graph can
  # miss.
  test-api-changed:
    name: Test API (changed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [trust, test-scope]
    # Focused per-diff tests: master push (post-merge) and every PR without the
    # `full-suite` label. Labeled PRs run the full matrix, avoiding double work.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && needs.test-scope.outputs.api == 'true'
      && (github.event_name == 'push'
        || (github.event_name == 'pull_request'
          && !contains(github.event.pull_request.labels.*.name, 'full-suite')))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build API dependencies
        run: bunx turbo run build --filter=./packages/**
      - name: Run changed API tests
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          # Force-push / new-branch pushes report an all-zero "before"; fall back
          # to the previous commit so --changed always has a valid diff base.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          echo "Running API tests changed since $BASE"
          cd apps/server/api && bunx vitest run --config vitest.config.ts \
            --maxWorkers=2 --passWithNoTests --changed "$BASE"
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}

  test-api:
    name: Test API (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, test-scope]
    # Full sharded suite is explicit: release/deploy QA (`run_heavy_tests`) or a
    # PR carrying the `full-suite` label. Ordinary PRs use changed tests only.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && needs.test-scope.outputs.api == 'true'
      && (inputs.run_heavy_tests
        || contains(github.event.pull_request.labels.*.name, 'full-suite'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build API dependencies
        run: bunx turbo run build --filter=./packages/**
      - name: Run API test shard
        run: cd apps/server/api && bunx vitest run --config vitest.config.ts --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}

  # OpenAPI documentation gate (#1247). This job regenerates the committed
  # artifact from the compiled bundle (headless emit — no DB/Redis, exits before
  # the listener) and fails when the spec drifted or the emit is non-deterministic.
  openapi-drift:
    name: OpenAPI Spec Drift
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [trust, test-scope]
    if: needs.trust.outputs.is-trusted == 'true' && needs.test-scope.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build api (compiled bundle)
        # The api package emits to apps/server/dist, outside apps/server/api.
        # Force a real build so a Turbo cache-hit replay cannot skip restoring
        # the compiled bundle the emit gate loads (same rationale as
        # build-verify.yml api-boot-check).
        run: bunx turbo run build --filter=@genfeedai/api --force
      - name: Emit spec twice — must be byte-identical
        run: |
          cd apps/server/api
          bun run scripts/emit-openapi.ts --skip-build --out=/tmp/openapi-emit-1.json
          bun run scripts/emit-openapi.ts --skip-build --out=/tmp/openapi-emit-2.json
          cmp /tmp/openapi-emit-1.json /tmp/openapi-emit-2.json
      - name: Committed spec must match generated
        run: |
          if ! cmp apps/server/api/openapi/openapi.json /tmp/openapi-emit-1.json; then
            echo "::error::apps/server/api/openapi/openapi.json is stale — regenerate with: bun run --filter=@genfeedai/api openapi:emit"
            exit 1
          fi
      - name: Validate spec (operationId coverage/uniqueness + allowlist)
        run: cd apps/server/api && bun run openapi:validate

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, format, lint, guards, typecheck]
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run build --filter='./packages/*' --filter=@genfeedai/docs --affected
          else
            bun run build
          fi

  # Stable aggregate for the test/build portion of pull-request CI. Every
  # upstream job is declared explicitly so an expression error that leaves an
  # applicable job skipped cannot produce a false-green gate. Full-suite and
  # changed-test jobs are mutually exclusive; scope-filtered skips are accepted
  # only when the scope detector marked them non-applicable.
  tests-gate:
    name: Tests Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test-scope
      - test-packages
      - test-server-services
      - test-web-desktop-mobile
      - test-extensions
      - test-app
      - test-app-changed
      - test-api
      - test-api-changed
      - openapi-drift
      - build
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v5

      - name: Aggregate test and build results
        env:
          TEST_SCOPE_APP: ${{ needs.test-scope.outputs.app }}
          TEST_SCOPE_API: ${{ needs.test-scope.outputs.api }}
          FULL_SUITE: ${{ contains(github.event.pull_request.labels.*.name, 'full-suite') }}
          TEST_SCOPE_RESULT: ${{ needs.test-scope.result }}
          TEST_PACKAGES_RESULT: ${{ needs.test-packages.result }}
          TEST_SERVER_SERVICES_RESULT: ${{ needs.test-server-services.result }}
          TEST_WEB_DESKTOP_MOBILE_RESULT: ${{ needs.test-web-desktop-mobile.result }}
          TEST_EXTENSIONS_RESULT: ${{ needs.test-extensions.result }}
          TEST_APP_RESULT: ${{ needs.test-app.result }}
          TEST_APP_CHANGED_RESULT: ${{ needs.test-app-changed.result }}
          TEST_API_RESULT: ${{ needs.test-api.result }}
          TEST_API_CHANGED_RESULT: ${{ needs.test-api-changed.result }}
          OPENAPI_DRIFT_RESULT: ${{ needs.openapi-drift.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        shell: bash
        run: node scripts/ci/tests-gate.mjs | tee -a "$GITHUB_STEP_SUMMARY"
