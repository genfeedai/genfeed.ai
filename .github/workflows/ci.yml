name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow this gate to be run as a reusable workflow (e.g. by full-suite.yml,
  # which chains CI → E2E on demand). No inputs needed; secrets are inherited.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TZ: UTC

jobs:
  trust:
    name: Trust Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      is-trusted: ${{ steps.non_pr.outputs.trusted || steps.check.outputs.trusted }}
    steps:
      - name: Allow non-PR events
        id: non_pr
        if: github.event_name != 'pull_request'
        run: echo "trusted=true" >> "$GITHUB_OUTPUT"

      - name: Check contributor trust
        id: check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const association = pr.author_association;
            const trustedRoles = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isSameRepository =
              pr.head.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const isTrusted = isSameRepository || trustedRoles.includes(association);
            const hasLabel = pr.labels.some(l => l.name === 'run-ci');

            if (isTrusted) {
              const trustReason = isSameRepository
                ? 'same-repo PR'
                : `trusted contributor (${association})`;
              core.info(`${trustReason} - CI allowed`);
              core.setOutput('trusted', 'true');
            } else if (hasLabel) {
              core.info('External contributor with run-ci label - CI allowed');
              core.setOutput('trusted', 'true');
            } else {
              core.setOutput('trusted', 'false');
              core.setFailed(
                `External contributor (${association}) - add the \`run-ci\` label to allow CI. ` +
                'A maintainer must review the code and add the label.'
              );
            }

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  secretlint:
    name: Secretlint (changed files)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" HEAD | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|yml|yaml|toml|sh|env.*)$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|yml|yaml|toml|sh|env.*)$' || true)
          fi
          if [ -z "$FILES" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No scannable files changed"
          else
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Scanning $(echo "$FILES" | wc -l | xargs) files"
          fi

      - name: Setup Bun environment
        if: steps.changed.outputs.files != ''
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Run secretlint on changed files
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs bunx secretlint
        timeout-minutes: 5

  react-doctor:
    name: React Health Check
    runs-on: ubuntu-latest
    needs: trust
    # Keep React Doctor in the main CI trust boundary. The old standalone
    # workflow duplicated checkout/setup overhead and the previous base-ref guard
    # skipped ordinary master PRs.
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && (
        github.event_name == 'push'
        || github.event_name == 'workflow_call'
        || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect React changes
        id: react_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No parent commit available; running React Doctor"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD)"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$CHANGED_FILES" | grep -E '^(apps/(app|website|docs|desktop|mobile|extensions)|packages/(ui|hooks|contexts|providers|pages|workflow-ui|agent))/' >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No React surface changes detected"
          fi

      - name: Setup Bun environment
        if: steps.react_changes.outputs.changed == 'true'
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Run React Doctor
        if: steps.react_changes.outputs.changed == 'true'
        run: |
          BASE="${{ steps.react_changes.outputs.base }}"

          if [ -n "$BASE" ]; then
            CHANGED_FILES="${RUNNER_TEMP:-/tmp}/react-doctor-changed-files.txt"
            git diff --name-only --diff-filter=ACMR "$BASE" HEAD \
              | grep -E '^(apps/(app|website|docs|desktop|mobile|extensions)|packages/(ui|hooks|contexts|providers|pages|workflow-ui|agent))/' \
              > "$CHANGED_FILES" || true

            if [ ! -s "$CHANGED_FILES" ]; then
              echo "No React source files to scan"
              exit 0
            fi

            REACT_DOCTOR_BASE_SHA="$BASE" bunx react-doctor@0.4.2 . --blocking error --project '*' --changed-files-from "$CHANGED_FILES"
          else
            bunx react-doctor@0.4.2 . --blocking error --project '*' --diff false
          fi

  architecture-guards:
    name: Architecture Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run check:architecture

  sql-risk-audit:
    name: SQL Risk Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run audit:api:sql:ci

  ui-guards:
    name: UI Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run check:ui-guards

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run lint --affected
          else
            bun run lint
          fi

  design:
    name: Design System
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'
      - run: bun run design:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run typecheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run type-check --affected
          else
            bun run type-check
          fi

  # Heavy test jobs run only on the on-demand full-suite path. full-suite.yml
  # invokes this workflow via `uses:` (workflow_call), so the gate must check for
  # 'workflow_call' — NOT 'workflow_dispatch' (which this workflow never
  # registers as a trigger; a dispatch gate left every test job permanently
  # unreachable, including on the full-suite run). Fast PR/master-push checks
  # (format, lint, typecheck, design, build) stay ungated above.
  test-scope:
    name: Test Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: trust
    # Runs on every event: workflow_call (release/full-suite) AND pull_request /
    # push so the focused `test-app-changed` gate below can read its outputs. The
    # heavy sharded test-* jobs keep their own `&& workflow_call` gate, so
    # broadening this does not trigger the full matrix on PRs.
    if: needs.trust.outputs.is-trusted == 'true'
    outputs:
      app: ${{ steps.scope.outputs.app }}
      api: ${{ steps.scope.outputs.api }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect app/API test scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" HEAD)

          if echo "$CHANGED_FILES" | grep -E '^(apps/app|packages/|package\.json|bun\.lock|turbo\.json|vitest\.config\.ts|\.github/workflows/ci\.yml)' >/dev/null; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -E '^(apps/server/api|packages/|package\.json|bun\.lock|turbo\.json|vitest\.config\.ts|\.github/workflows/ci\.yml)' >/dev/null; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true' && github.event_name == 'workflow_call'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter='./packages/*' --filter='./ee/packages/*'
          else
            bunx turbo run test --filter='./packages/*' --filter='./ee/packages/*'
          fi

  test-server-services:
    name: Test Server Services
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true' && github.event_name == 'workflow_call'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run server service tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter='./apps/server/*' --filter='!@genfeedai/api'
          else
            bunx turbo run test --filter='./apps/server/*' --filter='!@genfeedai/api'
          fi

  test-web-desktop-mobile:
    name: Test Web, Desktop, Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true' && github.event_name == 'workflow_call'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run web, desktop, and mobile tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter=@genfeedai/website --filter=@genfeedai/docs --filter=@genfeedai/desktop --filter=@genfeedai/mobile
          else
            bunx turbo run test --filter=@genfeedai/website --filter=@genfeedai/docs --filter=@genfeedai/desktop --filter=@genfeedai/mobile
          fi

  test-extensions:
    name: Test Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: trust
    if: needs.trust.outputs.is-trusted == 'true' && github.event_name == 'workflow_call'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run extension tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run test --affected --filter=@genfeedai/extension-browser --filter=extension-ide
          else
            bunx turbo run test --filter=@genfeedai/extension-browser --filter=extension-ide
          fi

  test-app:
    name: Test App (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, test-scope]
    if: needs.trust.outputs.is-trusted == 'true' && needs.test-scope.outputs.app == 'true' && github.event_name == 'workflow_call'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build app workspace
        run: bunx turbo run build --filter='./apps/app...'
      - name: Run app test shard
        run: cd apps/app && bunx vitest run --config ./vitest.config.mts --maxWorkers=2 --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test

  # Focused, blocking app tests on every PR and master push: runs only the
  # @genfeedai/app tests whose module graph touches the diff (vitest --changed),
  # so it stays fast while pinning any regression to the single PR/merge that
  # introduced it. The full sharded `test-app` matrix above still runs the whole
  # suite via workflow_call (full-suite / release), which catches cross-cutting
  # tests that --changed's static graph can miss (e.g. filesystem-scan contracts).
  test-app-changed:
    name: Test App (changed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [trust, test-scope]
    if: >-
      needs.trust.outputs.is-trusted == 'true'
      && needs.test-scope.outputs.app == 'true'
      && (github.event_name == 'pull_request' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build app workspace
        run: bunx turbo run build --filter='./apps/app...'
      - name: Run changed app tests
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          # Force-push / new-branch pushes report an all-zero "before"; fall back
          # to the previous commit so --changed always has a valid diff base.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          echo "Running app tests changed since $BASE"
          cd apps/app && bunx vitest run --config ./vitest.config.mts \
            --maxWorkers=2 --passWithNoTests --changed "$BASE"
        env:
          NODE_ENV: test

  test-api:
    name: Test API (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, test-scope]
    if: needs.trust.outputs.is-trusted == 'true' && needs.test-scope.outputs.api == 'true' && github.event_name == 'workflow_call'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Build API dependencies
        run: bunx turbo run build --filter=./packages/**
      - name: Run API test shard
        run: cd apps/server/api && bunx vitest run --config vitest.config.ts --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [trust, format, lint, design, typecheck]
    if: needs.trust.outputs.is-trusted == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
      - name: Run build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TURBO_SCM_BASE="${{ github.event.pull_request.base.sha }}" bunx turbo run build --filter='./packages/*' --affected
          else
            bun run build
          fi
