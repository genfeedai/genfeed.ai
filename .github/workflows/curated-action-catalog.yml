name: Curated Action Catalog

on:
  pull_request:
    paths:
      - 'packages/tools/src/registry/curated-action-catalog.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: UTC

jobs:
  catalog-changes:
    name: Curated Catalog Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Report additions, removals, and surface transitions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CATALOG_PATH: packages/tools/src/registry/curated-action-catalog.ts
        run: |
          BEFORE_CATALOG="${RUNNER_TEMP}/curated-action-catalog.before.ts"
          if ! git show "${BASE_SHA}:${CATALOG_PATH}" > "${BEFORE_CATALOG}"; then
            : > "${BEFORE_CATALOG}"
          fi

          bun run --filter=@genfeedai/tools catalog:changes -- \
            --before="${BEFORE_CATALOG}" \
            --after="${GITHUB_WORKSPACE}/${CATALOG_PATH}" \
            --summary="${GITHUB_STEP_SUMMARY}"
