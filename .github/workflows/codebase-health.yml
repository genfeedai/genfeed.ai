name: Codebase Health Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    name: Health Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2
        with:
          command: health --score --hotspots --min-score 60
          format: sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: fallow.sarif

  dead-code:
    name: Dead Code & Unused Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2
        with:
          command: dead-code --unused-exports --unused-deps --circular-deps
          format: annotations

  duplication:
    name: Code Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: fallow-rs/fallow@v2
        with:
          command: dupes --mode mild
          format: annotations

  skills:
    name: Skills Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate skills
        run: scripts/setup-skills.sh --check

  # Full-repo React health gate. The PR job in ci.yml only scans the diff, so
  # pre-existing errors in untouched files never gate it. This scans every
  # React workspace project (scoped by react-doctor.config.json) and fails on
  # any error-severity diagnostic, catching latent regressions repo-wide.
  react-doctor-full:
    name: React Doctor (full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Run React Doctor across all workspace projects
        run: bunx react-doctor@latest -y --fail-on error --verbose
