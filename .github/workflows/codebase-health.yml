name: Codebase Health Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    name: Health Score
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2
        with:
          # Pin the binary so a CLI-contract change can't silently break this
          # weekly job again — the @v2 action otherwise floats to the latest
          # fallow release (a flag rename to >=2.x is what red-lined this job).
          version: '2.96.0'
          # fallow v2 takes a bare subcommand here; flags moved to dedicated
          # inputs below (the old `health --score --hotspots --min-score 60`
          # string is rejected as an invalid command).
          command: health
          hotspots: true
          format: sarif
          # Report-only: still produce the SARIF for code scanning, but don't
          # red-line the weekly run on transient complexity findings. Re-enable
          # gating via max-cyclomatic / max-cognitive once the baseline is clean.
          fail-on-issues: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: fallow.sarif

  dead-code:
    name: Dead Code & Unused Deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2
        with:
          version: '2.96.0'
          command: dead-code
          # The --unused-* / --circular-deps flags are now the issue-types input.
          issue-types: unused-exports,unused-deps,circular-deps
          # `format: annotations` is invalid in fallow v2 (valid: human, json,
          # sarif, compact, markdown, ...). Inline annotations are a separate
          # boolean input.
          annotations: true
          format: compact
          # Report-only until the dead-code backlog is cleared; flip to true to
          # gate once green.
          fail-on-issues: false

  duplication:
    name: Code Duplication
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: fallow-rs/fallow@v2
        with:
          version: '2.96.0'
          command: dupes
          dupes-mode: mild
          annotations: true
          format: compact
          fail-on-issues: false

  skills:
    name: Skills Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Validate skills
        run: scripts/setup-skills.sh --check

  # Full-repo React health gate. The PR job in ci.yml only scans the diff, so
  # pre-existing errors in untouched files never gate it. This scans every
  # React workspace project (scoped by react-doctor.config.json) and fails on
  # any error-severity diagnostic, catching latent regressions repo-wide.
  react-doctor-full:
    name: React Doctor (full repo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: '24.x'
          bun-version: '1.3.14'
          cache-turbo: 'false'

      - name: Run React Doctor across all workspace projects
        run: bunx react-doctor@0.5.6 -y --blocking error --verbose
