# Production Deployment — thin caller for the reusable _deploy.yml workflow.
# Dispatch-only: cutting a release/tag does NOT auto-deploy. A maintainer
# explicitly dispatches this workflow to ship, so deploys are deliberate and
# it's always known exactly when prod was shipped.

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force deploy all services'
        required: false
        default: false
        type: boolean
      force_api:
        description: 'Force deploy API services (API + MCP + Notifications)'
        required: false
        default: false
        type: boolean
      force_bots:
        description: 'Force deploy bot services (Telegram, Discord, Slack, Fanvue, Clips)'
        required: false
        default: false
        type: boolean
      force_workers:
        description: 'Force deploy workers'
        required: false
        default: false
        type: boolean
      force_redis:
        description: 'Force Redis deployment even if already healthy'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip pre-deployment tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  validate-production-ref:
    name: Validate production ref
    runs-on: ubuntu-latest
    steps:
      - name: Require master for production deploys
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Production workflow_dispatch must run from master. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "release" ] && [ "${RELEASE_TARGET_COMMITISH}" != "master" ]; then
            echo "::error::Production releases must target master. Current target: ${RELEASE_TARGET_COMMITISH}"
            exit 1
          fi
        env:
          RELEASE_TARGET_COMMITISH: ${{ github.event.release.target_commitish || '' }}

  deploy-backend:
    name: Legacy EC2 backend disabled
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    needs: validate-production-ref
    runs-on: ubuntu-latest
    steps:
      - name: Skip legacy Tailscale/SSH backend deploy
        run: |
          echo "::warning::The legacy EC2/Tailscale/Docker Compose backend deploy is disabled after the ECS/Fargate cutover."
          echo "::warning::Use the Deploy ECS (production) workflow for managed backend deploys."

  # Deploy all Vercel frontend apps in parallel after backend is up.
  # Secret: VERCEL_TOKEN (auth)
  # Vars: VERCEL_ORG_ID, VERCEL_PROJECT_ID_APP, _ADMIN, _WEBSITE, _DOCS
  deploy-app:
    name: Deploy app.genfeed.ai
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - name: Normalize app Vercel production env
        run: |
          set -euo pipefail

          update_env() {
            local name="$1"
            local value="$2"

            if ! npx vercel env update "$name" production --yes --value "$value" --cwd . --token="${VERCEL_TOKEN}"; then
              printf '%s' "$value" | npx vercel env add "$name" production --cwd . --token="${VERCEL_TOKEN}"
            fi
          }

          : "${CLERK_SECRET_KEY:?CLERK_SECRET_KEY GitHub secret is required}"

          clerk_publishable_key="pk_live_$(printf '%s$' "${CLERK_FRONTEND_API_DOMAIN}" | base64 | tr -d '=\n')"
          update_env CLERK_SECRET_KEY "${CLERK_SECRET_KEY}"
          update_env NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY "${clerk_publishable_key}"
          update_env NEXT_PUBLIC_GENFEED_CLOUD "true"
          update_env NEXT_PUBLIC_API_ENDPOINT "https://api.genfeed.ai/v1"
          update_env API_URL "https://api.genfeed.ai/v1"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_APP }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_FRONTEND_API_DOMAIN: clerk.genfeed.ai
      - run: npx vercel deploy --cwd . --archive=tgz --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_APP }}

  # admin.genfeed.ai does not currently have a dedicated app root in this repo.
  # Keep this skipped until the Vercel project is deliberately re-homed.
  deploy-admin:
    name: Deploy admin.genfeed.ai
    if: ${{ vars.ENABLE_ADMIN_VERCEL_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --cwd . --archive=tgz --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_ADMIN }}

  deploy-website:
    name: Deploy genfeed.ai
    if: ${{ vars.ENABLE_WEBSITE_VERCEL_DEPLOY == 'true' && (github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v')) }}
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --cwd . --archive=tgz --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEBSITE }}

  deploy-docs:
    name: Deploy docs.genfeed.ai
    if: ${{ vars.ENABLE_DOCS_VERCEL_DEPLOY == 'true' && (github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v')) }}
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --cwd . --archive=tgz --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_DOCS }}
