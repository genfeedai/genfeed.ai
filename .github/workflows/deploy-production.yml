# Production Deployment — thin caller for the reusable _deploy.yml workflow
# Triggers on GitHub release (like cal.com). Contributors PR against develop;
# maintainers merge develop → master, then create a release to deploy.
# Manual dispatch is also available for hotfixes.

name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force deploy all services'
        required: false
        default: false
        type: boolean
      force_api:
        description: 'Force deploy API services (API + MCP + Notifications)'
        required: false
        default: false
        type: boolean
      force_bots:
        description: 'Force deploy bot services (Telegram, Discord, Slack, Fanvue, Clips)'
        required: false
        default: false
        type: boolean
      force_workers:
        description: 'Force deploy workers'
        required: false
        default: false
        type: boolean
      force_redis:
        description: 'Force Redis deployment even if already healthy'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip pre-deployment tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-backend:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      workers_follow_api: true
      force_all: ${{ (github.event_name == 'release') || inputs.force_all || false }}
      force_api: ${{ inputs.force_api || false }}
      force_bots: ${{ inputs.force_bots || false }}
      force_workers: ${{ inputs.force_workers || false }}
      force_redis: ${{ inputs.force_redis || false }}
      skip_tests: ${{ inputs.skip_tests || false }}
    secrets: inherit

  # Deploy all Vercel frontend apps in parallel after backend is up.
  # Secret: VERCEL_TOKEN (auth)
  # Vars: VERCEL_ORG_ID, VERCEL_PROJECT_ID_APP, _ADMIN, _WEBSITE, _DOCS
  deploy-app:
    name: Deploy app.genfeed.ai
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_APP }}

  deploy-admin:
    name: Deploy admin.genfeed.ai
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_ADMIN }}

  deploy-website:
    name: Deploy genfeed.ai
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEBSITE }}

  deploy-docs:
    name: Deploy docs.genfeed.ai
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v5
      - run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_DOCS }}
