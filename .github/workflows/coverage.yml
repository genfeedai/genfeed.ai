name: Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Matrix job for standard packages ──
  coverage-packages:
    name: Coverage — ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/agent
          - packages/client
          - packages/config
          - packages/constants
          - packages/contexts
          - packages/core
          - packages/enums
          - packages/helpers
          - packages/integrations
          - packages/models
          - packages/serializers
          - packages/services
          - packages/ui
          - packages/utils
          - packages/workflow-engine
          - packages/workflow-saas
          - packages/workflow-ui
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install"

      - name: Build workspace
        run: bunx turbo build

      - name: Run coverage
        run: cd ${{ matrix.package }} && npx vitest run --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ strategy.job-index }}
          path: ${{ matrix.package }}/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ matrix.package }}/coverage
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  # ── Hooks — needs custom vitest config flag ──
  coverage-hooks:
    name: Coverage — packages/hooks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install"

      - name: Build workspace
        run: bunx turbo build

      - name: Run coverage
        run: cd packages/hooks && npx vitest run --coverage --config vitest.config.mts

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-hooks
          path: packages/hooks/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/hooks/coverage
          flags: hooks
          fail_ci_if_error: false

  # ── API — needs CLERK_SECRET_KEY env ──
  coverage-api:
    name: Coverage — apps/server/api
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install"

      - name: Build workspace
        run: bunx turbo build

      - name: Run coverage
        run: cd apps/server/api && npx vitest run --coverage
        env:
          NODE_ENV: test
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'test-mock-clerk-key' }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/server/api/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/server/api/coverage
          flags: api
          fail_ci_if_error: false
