name: Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: UTC

jobs:
  # ── Matrix job for standard packages ──
  coverage-packages:
    name: Coverage — ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/agent
          - packages/client
          - packages/config
          - packages/constants
          - packages/contexts
          - packages/enums
          - packages/helpers
          - packages/integrations
          - packages/models
          - packages/serializers
          - packages/services
          - packages/ui
          - packages/utils
          - packages/workflow-engine
          - packages/workflow-ui
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Build workspace
        run: bunx turbo run build --filter='./${{ matrix.package }}...'

      - name: Run coverage
        run: cd ${{ matrix.package }} && bunx vitest run --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ strategy.job-index }}
          path: ${{ matrix.package }}/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        # Coverage is a best-effort weekly report, not a gate. Without a
        # CODECOV_TOKEN (public repo / forks) the uploader exits non-zero even
        # with fail_ci_if_error:false, which reds the job. Never let the upload
        # fail the workflow.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ matrix.package }}/coverage
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  # ── Hooks — needs custom vitest config flag ──
  coverage-hooks:
    name: Coverage — packages/hooks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Build workspace
        run: bunx turbo run build --filter='./packages/hooks...'

      - name: Run coverage
        run: cd packages/hooks && bunx vitest run --coverage --config vitest.config.mts

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-hooks
          path: packages/hooks/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        # Coverage is a best-effort weekly report, not a gate. Without a
        # CODECOV_TOKEN (public repo / forks) the uploader exits non-zero even
        # with fail_ci_if_error:false, which reds the job. Never let the upload
        # fail the workflow.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/hooks/coverage
          flags: hooks
          fail_ci_if_error: false

  # ── App — sharded 4-way to keep Next/Vitest memory bounded ──
  coverage-app:
    name: Coverage — apps/app (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Build workspace
        run: bunx turbo run build --filter='./apps/app...'

      - name: Run coverage
        run: cd apps/app && bun run test:cov:shard -- --reporter=blob --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test

      - name: Upload blob report artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-app-blob-${{ matrix.shard }}
          path: apps/app/.vitest-reports/
          # .vitest-reports is a dotfolder. upload-artifact excludes hidden
          # files by default, which silently produced empty blob artifacts and
          # starved the merge job (ENOENT on .vitest-reports).
          include-hidden-files: true
          retention-days: 7

  coverage-app-merge:
    name: Coverage — apps/app (merge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coverage-app
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Download blob report artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-app-blob-*
          path: apps/app/.vitest-reports
          merge-multiple: true

      - name: Merge coverage reports
        run: cd apps/app && bunx vitest --merge-reports .vitest-reports --coverage --config ./vitest.config.mts
        env:
          NODE_ENV: test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-app
          path: apps/app/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        # Coverage is a best-effort weekly report, not a gate. Without a
        # CODECOV_TOKEN (public repo / forks) the uploader exits non-zero even
        # with fail_ci_if_error:false, which reds the job. Never let the upload
        # fail the workflow.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/app/coverage
          flags: app
          fail_ci_if_error: false

  # ── API — sharded 4-way; needs BETTER_AUTH_SECRET env ──
  coverage-api:
    name: Coverage — apps/server/api (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Build workspace
        run: bunx turbo run build --filter=./packages/**

      - name: Run coverage
        run: cd apps/server/api && bunx vitest run --reporter=blob --coverage --shard=${{ matrix.shard }}/4
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}

      - name: Upload blob report artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-api-blob-${{ matrix.shard }}
          path: apps/server/api/.vitest-reports/
          # .vitest-reports is a dotfolder. upload-artifact excludes hidden
          # files by default, which silently produced empty blob artifacts and
          # starved the merge job (ENOENT on .vitest-reports).
          include-hidden-files: true
          retention-days: 7

  coverage-api-merge:
    name: Coverage — apps/server/api (merge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: coverage-api
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"

      - name: Download blob report artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-api-blob-*
          path: apps/server/api/.vitest-reports
          merge-multiple: true

      - name: Merge coverage reports
        run: cd apps/server/api && bunx vitest --merge-reports .vitest-reports --coverage
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-api
          path: apps/server/api/coverage/
          retention-days: 7

      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        # Coverage is a best-effort weekly report, not a gate. Without a
        # CODECOV_TOKEN (public repo / forks) the uploader exits non-zero even
        # with fail_ci_if_error:false, which reds the job. Never let the upload
        # fail the workflow.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/server/api/coverage
          flags: api
          fail_ci_if_error: false

  # ── Frontend E2E coverage — sharded 4-way (V8 → monocart) ──
  # Lives here, NOT in e2e.yml, so a slow/cancelled coverage run can never turn
  # the E2E gate red. Inherits this workflow's triggers (workflow_dispatch +
  # weekly Mon 6am UTC) and runs the mocked app-core suite only. Each shard is an
  # isolated machine; the 4 lcov reports are merged server-side by Codecov via the
  # shared `app-e2e` flag, so no cross-shard merge job is needed.
  coverage-e2e:
    name: Coverage — apps/app E2E (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "22.x"
          install-command: "bun install --frozen-lockfile"
          cache-playwright: "true"

      - name: Build app (Playwright test mode + browser source maps)
        run: bunx turbo run build --filter=@genfeedai/app
        env:
          E2E_COVERAGE: "1"
          NEXT_PUBLIC_PLAYWRIGHT_TEST: "true"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}
          NEXT_PUBLIC_API_URL: http://localhost:3010

      - name: Run E2E coverage shard ${{ matrix.shard }}/4
        # No --reporter override here so the monocart reporter (lcov + v8) from
        # playwright-coverage.config.ts runs in full. --shard splits app-core.
        # Threshold 0 — this run reports coverage, it does not gate on it.
        run: bun run test:e2e:coverage -- --shard=${{ matrix.shard }}/4
        env:
          CI: true
          APP_BASE_URL: http://localhost:3000
          E2E_COVERAGE_THRESHOLD: "0"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'test-better-auth-secret' }}
          NEXT_PUBLIC_BETTER_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_BETTER_AUTH_ENABLED || 'true' }}

      - name: Upload coverage artifact (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-coverage-shard-${{ matrix.shard }}
          path: playwright-report/coverage/
          retention-days: 7

      - name: Report E2E coverage to Codecov (shard ${{ matrix.shard }})
        uses: codecov/codecov-action@v6
        if: always()
        # Best-effort upload; never let a missing token / empty report red the job.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: playwright-report/coverage/lcov.info
          flags: app-e2e
          fail_ci_if_error: false
