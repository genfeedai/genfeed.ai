name: React Doctor

on:
  pull_request:
    branches: [master, develop, staging]
    paths:
      - 'apps/app/**'
      - 'apps/website/**'
      - 'apps/docs/**'
      - 'apps/desktop/**'
      - 'apps/mobile/**'
      - 'packages/ui/**'
      - 'packages/hooks/**'
      - 'packages/contexts/**'
      - 'packages/providers/**'
      - 'packages/pages/**'
      - 'packages/workflow-ui/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: React Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@main
        with:
          directory: '.'
          diff: ${{ github.event.pull_request.base.ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: 'error'
          verbose: 'true'
