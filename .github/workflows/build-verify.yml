# Build Verification — builds the server image + boots the EE/SaaS bundle.
# Trunk model: runs on master pushes (post-merge gate) + manual dispatch (used
# at release cut), NOT on every PR — keeps PRs fast; heavy gates run at
# merge/release. The boot step is the #574 circular-dep regression guard.
name: Build Verify

# Build + boot verification runs at release/preview time only (dispatch or as a
# called step in full-suite) — NOT on every PR or master push. Keeps PR/master
# CI to the fast required checks; heavy compile/boot validation happens when you
# cut a preview/release.
on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-verify-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: genfeed-server-verify

jobs:
  build-and-boot:
    name: Build & Boot Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR (for build cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build unified server image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.server
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository }}/server:buildcache-verify
          platforms: linux/amd64
          # No Sentry secrets needed — verify-only build, sourcemaps not deployed

      - name: Verify build outputs exist
        run: |
          echo "Checking build outputs inside image..."
          docker run --rm ${{ env.IMAGE_NAME }}:test \
            sh -c '
              echo "Checking critical bundles..."
              test -f apps/server/dist/apps/api/main.js && echo "✅ API bundle" || (echo "❌ API bundle missing" && exit 1)
              test -f apps/server/dist/apps/workers/main.js && echo "✅ Workers bundle" || (echo "❌ Workers bundle missing" && exit 1)
              test -f apps/server/dist/apps/files/main.js && echo "✅ Files bundle" || (echo "❌ Files bundle missing" && exit 1)
              test -f apps/server/dist/apps/mcp/main.js && echo "✅ MCP bundle" || (echo "❌ MCP bundle missing" && exit 1)
              test -f apps/server/dist/apps/notifications/main.js && echo "✅ Notifications bundle" || (echo "❌ Notifications bundle missing" && exit 1)
              test -f apps/server/dist/apps/telegram/main.js && echo "✅ Telegram bundle" || (echo "❌ Telegram bundle missing" && exit 1)
              test -f apps/server/dist/apps/discord/main.js && echo "✅ Discord bundle" || (echo "❌ Discord bundle missing" && exit 1)
              test -f apps/server/dist/apps/slack/main.js && echo "✅ Slack bundle" || (echo "❌ Slack bundle missing" && exit 1)
              test -f apps/server/dist/apps/clips/main.js && echo "✅ Clips bundle" || (echo "❌ Clips bundle missing" && exit 1)
              test -f apps/server/dist/apps/images/main.js && echo "✅ Images bundle" || (echo "❌ Images bundle missing" && exit 1)
              test -f apps/server/dist/apps/voices/main.js && echo "✅ Voices bundle" || (echo "❌ Voices bundle missing" && exit 1)
              test -f apps/server/dist/apps/videos/main.js && echo "✅ Videos bundle" || (echo "❌ Videos bundle missing" && exit 1)
              echo ""
              echo "All 12 service bundles verified ✅"

              # Check bundle sizes (catch empty/broken bundles)
              for svc in api workers files mcp notifications telegram discord slack clips images voices videos; do
                SIZE=$(stat -c%s "apps/server/dist/apps/$svc/main.js" 2>/dev/null || echo "0")
                if [ "$SIZE" -lt 10000 ]; then
                  echo "❌ $svc bundle suspiciously small (${SIZE} bytes)"
                  exit 1
                fi
                echo "  $svc: $(( SIZE / 1024 ))KB"
              done
            '

      - name: Boot-check EE/SaaS api bundle (#574 circular-dep regression guard)
        run: |
          echo "Booting the EE/SaaS api bundle to prove the module graph initializes..."
          # The bundle-exists check above never RUNS the bundle. The EE billing
          # decouple (#563) introduced an ESM eval-time circular dependency that
          # crashed api on boot with a TDZ ("Cannot access 'userSubscriptions'
          # before initialization") — invisible to typecheck/lint/vitest (which
          # resolve @billing-providers to the OSS stub) and to the self-hosted E2E
          # (community image). This boots the actual EE bundle that prod runs.
          docker run --rm -e NODE_ENV=production ${{ env.IMAGE_NAME }}:test \
            sh -c '
              set +e
              # It will fail shortly after on missing PORT/DB/Redis env — that is
              # EXPECTED and proves the module graph (DI container) initialized.
              OUT=$(timeout 40 node apps/server/dist/apps/api/main.js 2>&1)
              echo "----- boot output (tail) -----"
              echo "$OUT" | tail -n 60
              echo "------------------------------"
              if echo "$OUT" | grep -qiE "Cannot access .* before initialization|ReferenceError"; then
                echo "❌ #574 regression: EE api bundle crashed at module init (circular-dep TDZ)"
                exit 1
              fi
              if [ -z "$OUT" ]; then
                echo "❌ EE api bundle produced no output — cannot confirm module init"
                exit 1
              fi
              echo "✅ EE api bundle initialized past the module graph (no TDZ)"
            '

      - name: Build summary
        if: success()
        run: |
          echo "## ✅ Build Verification Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker image built + all 12 bundles verified; EE api bundle booted past module init (#574 guard)." >> $GITHUB_STEP_SUMMARY
