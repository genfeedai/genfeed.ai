name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

jobs:
  desktop-release-qa:
    name: Desktop Release QA
    uses: ./.github/workflows/desktop-qa.yml

  desktop-macos:
    needs: desktop-release-qa
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
      DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
      GENFEED_DESKTOP_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate macOS signing secrets
        run: |
          missing=0
          for credential_name in \
            APPLE_API_PRIVATE_KEY_P8_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            DEVELOPER_ID_P12_BASE64 \
            DEVELOPER_ID_P12_PASSWORD
          do
            if [ -z "${!credential_name}" ]; then
              echo "::error::Missing required credential: ${credential_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Bun environment
        uses: ./.github/actions/setup-bun-env
        with:
          node-version: "24.x"
          bun-version: "1.3.14"

      - name: Install App Store Connect API key
        run: |
          APPLE_API_KEY="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8_BASE64" | base64 --decode > "$APPLE_API_KEY"
          chmod 600 "$APPLE_API_KEY"
          echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"

      - name: Install Apple signing certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/genfeed-desktop.keychain-db"
          CERT_PATH="$RUNNER_TEMP/genfeed-desktop-signing.p12"
          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "${DEVELOPER_ID_P12_PASSWORD}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${DEVELOPER_ID_P12_PASSWORD}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${DEVELOPER_ID_P12_PASSWORD}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${DEVELOPER_ID_P12_PASSWORD}" "$KEYCHAIN_PATH"

      - name: Desktop lint
        run: bun run --filter=@genfeedai/desktop lint

      - name: Desktop type-check
        run: bun run --filter=@genfeedai/desktop type-check

      - name: Desktop tests
        run: bun run --filter=@genfeedai/desktop test

      - name: Desktop build
        run: bun run --filter=@genfeedai/desktop build

      - name: Desktop smoke test
        run: bun run --filter=@genfeedai/desktop smoke

      - name: Build macOS release artifact
        run: bun run --filter=@genfeedai/desktop release:mac

      - name: Notarize and staple macOS disk images
        run: |
          for dmg in apps/desktop/app/release/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 30m
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Verify Developer ID signature and notarization
        run: |
          DMG_PATH="$(find apps/desktop/app/release -maxdepth 1 -name '*.dmg' -type f | head -1)"
          MOUNT_PATH="$(mktemp -d)"

          if [ -z "$DMG_PATH" ]; then
            echo "::error::macOS disk image was not created"
            exit 1
          fi

          cleanup() {
            hdiutil detach "$MOUNT_PATH" >/dev/null 2>&1 || true
            rmdir "$MOUNT_PATH" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach -readonly -nobrowse -mountpoint "$MOUNT_PATH" "$DMG_PATH"
          APP_PATH="$(find "$MOUNT_PATH" -maxdepth 2 -name 'GenFeed.app' -type d | head -1)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::GenFeed.app was not found in the disk image"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvvv "$APP_PATH" 2>&1 | grep -F 'Authority=Developer ID Application'
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Capture packaged visual QA
        run: bun run --filter=@genfeedai/desktop visual:qa:release

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: genfeed-desktop-macos
          path: |
            apps/desktop/app/release/*.dmg
            apps/desktop/app/release/*.zip
            apps/desktop/app/release/*.blockmap
            apps/desktop/app/release/*.yml
            apps/desktop/app/release/genfeed-desktop-release.json
          if-no-files-found: error

      - name: Upload visual QA screenshots
        uses: actions/upload-artifact@v7
        with:
          name: genfeed-desktop-visual-qa
          path: apps/desktop/app/visual-qa/*.png
          if-no-files-found: error

  publish-desktop-release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: desktop-macos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: genfeed-desktop-macos
          path: release

      - name: Attach macOS artifacts to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            release/*
