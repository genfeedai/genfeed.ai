name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

jobs:
  desktop-macos:
    runs-on: macos-latest
    env:
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
      APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GENFEED_DESKTOP_RELEASE: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate macOS signing secrets
        run: |
          missing=0
          for secret_name in \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_SIGNING_CERTIFICATE_BASE64 \
            APPLE_SIGNING_CERTIFICATE_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Apple signing certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/genfeed-desktop.keychain-db"
          CERT_PATH="$RUNNER_TEMP/genfeed-desktop-signing.p12"
          echo "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${APPLE_SIGNING_CERTIFICATE_PASSWORD}" "$KEYCHAIN_PATH"

      - name: Desktop lint
        run: bun run --filter=@genfeedai/desktop lint

      - name: Desktop type-check
        run: bun run --filter=@genfeedai/desktop type-check

      - name: Desktop tests
        run: bun run --filter=@genfeedai/desktop test

      - name: Desktop build
        run: bun run --filter=@genfeedai/desktop build

      - name: Desktop smoke test
        run: bun run --filter=@genfeedai/desktop smoke

      - name: Build macOS release artifact
        run: bun run --filter=@genfeedai/desktop release:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genfeed-desktop-macos
          path: apps/desktop/app/release/*
          if-no-files-found: error

  publish-desktop-release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: desktop-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: genfeed-desktop-macos
          path: release

      - name: Attach macOS artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            release/*
