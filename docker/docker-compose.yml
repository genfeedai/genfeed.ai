services:
  api:
    build: { context: .., dockerfile: docker/Dockerfile, target: api }
    ports: ["${API_PORT:-3010}:${API_PORT:-3010}"]
    env_file: .env
    environment:
      - PORT=${API_PORT:-3010}
    depends_on: [postgres, redis]

  web:
    build: { context: .., dockerfile: docker/Dockerfile, target: web }
    ports: ["${APP_PORT:-3000}:${APP_PORT:-3000}"]
    env_file: .env
    environment:
      - PORT=${APP_PORT:-3000}

  workers:
    build: { context: .., dockerfile: docker/Dockerfile, target: workers }
    ports: ["${WORKERS_PORT:-3013}:${WORKERS_PORT:-3013}"]
    env_file: .env
    environment:
      - PORT=${WORKERS_PORT:-3013}
    depends_on: [redis, postgres]

  files:
    build: { context: .., dockerfile: docker/Dockerfile, target: files }
    ports: ["${FILES_PORT:-3012}:${FILES_PORT:-3012}"]
    env_file: .env
    environment:
      - PORT=${FILES_PORT:-3012}
    depends_on: [redis, postgres]

  notifications:
    build: { context: .., dockerfile: docker/Dockerfile, target: notifications }
    ports: ["${NOTIFICATIONS_PORT:-3011}:${NOTIFICATIONS_PORT:-3011}"]
    env_file: .env
    environment:
      - PORT=${NOTIFICATIONS_PORT:-3011}
    depends_on: [redis]

  # Bot services (opt-in: docker compose --profile bots up)
  discord:
    build: { context: .., dockerfile: docker/Dockerfile, target: discord }
    ports: ["${DISCORD_PORT:-3016}:${DISCORD_PORT:-3016}"]
    env_file: .env
    environment:
      - PORT=${DISCORD_PORT:-3016}
    depends_on: [redis]
    profiles: [bots]

  slack:
    build: { context: .., dockerfile: docker/Dockerfile, target: slack }
    ports: ["${SLACK_PORT:-3018}:${SLACK_PORT:-3018}"]
    env_file: .env
    environment:
      - PORT=${SLACK_PORT:-3018}
    depends_on: [redis]
    profiles: [bots]

  telegram:
    build: { context: .., dockerfile: docker/Dockerfile, target: telegram }
    ports: ["${TELEGRAM_PORT:-3019}:${TELEGRAM_PORT:-3019}"]
    env_file: .env
    environment:
      - PORT=${TELEGRAM_PORT:-3019}
    depends_on: [redis]
    profiles: [bots]

  # GPU services (opt-in: docker compose --profile gpu up)
  images:
    build: { context: .., dockerfile: docker/Dockerfile, target: images }
    ports: ["${IMAGES_PORT:-3020}:${IMAGES_PORT:-3020}"]
    env_file: .env
    environment:
      - PORT=${IMAGES_PORT:-3020}
    profiles: [gpu]

  videos:
    build: { context: .., dockerfile: docker/Dockerfile, target: videos }
    ports: ["${VIDEOS_PORT:-3021}:${VIDEOS_PORT:-3021}"]
    env_file: .env
    environment:
      - PORT=${VIDEOS_PORT:-3021}
    profiles: [gpu]

  voices:
    build: { context: .., dockerfile: docker/Dockerfile, target: voices }
    ports: ["${VOICES_PORT:-3022}:${VOICES_PORT:-3022}"]
    env_file: .env
    environment:
      - PORT=${VOICES_PORT:-3022}
    profiles: [gpu]

  # Infrastructure
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-genfeed}
      - POSTGRES_USER=${POSTGRES_USER:-genfeed}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-genfeed_local}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    ports: ["${POSTGRES_PORT:-5432}:5432"]

  redis:
    image: redis:7-alpine
    volumes: ["redis_data:/data"]
    ports: ["${REDIS_PORT:-6379}:6379"]

volumes:
  postgres_data:
  redis_data:
