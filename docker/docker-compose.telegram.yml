services:
  telegram:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/telegram", "start:prod"]
    container_name: genfeed-ai-telegram
    restart: unless-stopped
    ports:
      - '${TELEGRAM_PORT:-3019}:${TELEGRAM_PORT:-3019}'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:${API_PORT:-3010}
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=${TELEGRAM_PORT:-3019}
    networks:
      - genfeed-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${TELEGRAM_PORT:-3019}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
