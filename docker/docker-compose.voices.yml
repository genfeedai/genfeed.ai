# Docker Compose for voices.genfeed.ai GPU instance
# Runs: NestJS API + Qwen3 TTS + Redis on a g4dn.xlarge (T4 16GB)

services:
  api:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/voices", "start:prod"]
    container_name: voices-api
    ports:
      - '8189:3013'
    environment:
      - REDIS_URL=redis://redis:6379
      - TTS_INFERENCE_URL=http://tts:8188
      - NODE_ENV=production
      - PORT=3013
      - SERVICE_NAME=voices
      - VERSION=1.0.0
    env_file:
      - .env.voices
    depends_on:
      redis:
        condition: service_healthy
      tts:
        condition: service_started
    restart: unless-stopped
    networks:
      - fleet-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3013/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  tts:
    image: ghcr.io/genfeedai/qwen3-tts:${QWEN3_TTS_TAG:-latest}
    container_name: voices-tts
    ports:
      - '8188:8188'
    volumes:
      - tts-models:/opt/models
      - tts-voices:/opt/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - fleet-network

  redis:
    image: redis:7-alpine
    container_name: voices-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - fleet-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 3s
      retries: 5

volumes:
  tts-models:
  tts-voices:
  redis-data:

networks:
  fleet-network:
    driver: bridge
