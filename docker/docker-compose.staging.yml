# Docker Compose v2 Configuration
# Staging Docker Compose — single source of truth for all services
# Services: Redis, API, Clips, Discord, Fanvue, Files, MCP, Notifications, Slack, Telegram, Workers
# Used by deploy-staging.sh for wave-based deployment
#
# Port scheme:
#   redis         6379
#   api           3010
#   workers       3011
#   files         3012
#   notifications 3013
#   mcp           3014
#   discord       3020
#   slack         3021
#   telegram      3022
#   clips         3030
#   fanvue        3004
#
# Environment strategy:
#   env_file: root + service envs  — shared defaults plus service overrides
#   environment:                   — Docker-network overrides + service metadata only

services:
  # ── Infrastructure ──────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: genfeed-staging-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - staging-redis-data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    networks:
      - genfeed-staging-infra
    healthcheck:
      test: ['CMD', 'sh', '-c', 'redis-cli -a $$REDIS_PASSWORD ping || exit 1']
      interval: 30s
      timeout: 3s
      retries: 5
    environment:
      - TZ=America/Los_Angeles
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # ── Core services (API dependencies) ───────────────────────────

  files:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/files", "start:prod"]
    container_name: genfeed-staging-files
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3012:3012'
    env_file:
      - ../.env.staging
      - ../apps/server/files/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3012
      - SERVICE_NAME=files
      - VERSION=1.0.0
    volumes:
      - staging-files-logs:/usr/src/app/apps/server/files/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3012/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/mcp", "start:prod"]
    container_name: genfeed-staging-mcp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3014:3014'
    env_file:
      - ../.env.staging
      - ../apps/server/mcp/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3014
      - SERVICE_NAME=mcp
      - VERSION=1.0.0
    volumes:
      - staging-mcp-logs:/usr/src/app/apps/server/mcp/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3014/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  notifications:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/notifications", "start:prod"]
    container_name: genfeed-staging-notifications
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3013:3013'
    env_file:
      - ../.env.staging
      - ../apps/server/notifications/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3013
      - SERVICE_NAME=notifications
      - VERSION=1.0.0
    volumes:
      - staging-notifications-logs:/usr/src/app/apps/server/notifications/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3013/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── API (main gateway) ─────────────────────────────────────────

  api:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/api", "start:prod"]
    container_name: genfeed-staging-api
    depends_on:
      redis:
        condition: service_healthy
      files:
        condition: service_healthy
      mcp:
        condition: service_healthy
      notifications:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3010:3010'
    env_file:
      - ../.env.staging
      - ../apps/server/api/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - GENFEEDAI_MICROSERVICES_FILES_URL=http://files:3012
      - GENFEEDAI_MICROSERVICES_MCP_URL=http://mcp:3014
      - GENFEEDAI_MICROSERVICES_NOTIFICATIONS_URL=http://notifications:3013
      - NODE_ENV=production
      - PORT=3010
      - SERVICE_NAME=api
      - VERSION=1.0.0
    volumes:
      - staging-api-logs:/usr/src/app/apps/server/api/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3010/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Clips ───────────────────────────────────────────────────────

  clips:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/clips", "start:prod"]
    container_name: genfeed-staging-clips
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3030:3030'
    env_file:
      - ../.env.staging
      - ../apps/server/clips/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:3010
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - GENFEEDAI_MICROSERVICES_FILES_URL=http://files:3012
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_ENV=production
      - PORT=3030
      - SERVICE_NAME=clips
      - VERSION=1.0.0
    volumes:
      - staging-clips-logs:/usr/src/app/apps/server/clips/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3030/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Bot services ────────────────────────────────────────────────

  discord:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/discord", "start:prod"]
    container_name: genfeed-staging-discord
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3020:3020'
    env_file:
      - ../.env.staging
      - ../apps/server/discord/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:3010
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=3020
      - SERVICE_NAME=discord
      - VERSION=1.0.0
    volumes:
      - staging-discord-logs:/usr/src/app/apps/server/discord/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-bots
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3020/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  fanvue:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/fanvue", "start:prod"]
    container_name: genfeed-staging-fanvue
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3004:3004'
    env_file:
      - ../.env.staging
      - ../apps/server/fanvue/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3004
      - SERVICE_NAME=fanvue
      - VERSION=1.0.0
    volumes:
      - staging-fanvue-logs:/usr/src/app/apps/server/fanvue/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-bots
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3004/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  slack:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/slack", "start:prod"]
    container_name: genfeed-staging-slack
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3021:3021'
    env_file:
      - ../.env.staging
      - ../apps/server/slack/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:3010
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=3021
      - SERVICE_NAME=slack
      - VERSION=1.0.0
    volumes:
      - staging-slack-logs:/usr/src/app/apps/server/slack/logs
    networks:
      - genfeed-staging-infra
      - genfeed-staging-bots
      - genfeed-staging-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3021/v1/health']
      interval: 30s
