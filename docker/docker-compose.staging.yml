  # ── Background workers ─────────────────────────────────────────

  workers:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/workers", "start:prod"]
    container_name: genfeed-staging-workers
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3011:3011'
    env_file:
      - ../.env.staging
      - ../apps/server/workers/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3011
      - SERVICE_NAME=workers
      - VERSION=1.0.0
    networks:
      - genfeed-staging-infra
      - genfeed-staging-workers
    volumes:
      - staging-workers-logs:/usr/src/app/apps/server/workers/logs
      - staging-workers-data:/usr/src/app/apps/server/workers/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3011/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  staging-redis-data:
    driver: local
  staging-api-logs:
    driver: local
  staging-clips-logs:
    driver: local
  staging-discord-logs:
    driver: local
  staging-fanvue-logs:
    driver: local
  staging-files-logs:
    driver: local
  staging-mcp-logs:
    driver: local
  staging-notifications-logs:
    driver: local
  staging-slack-logs:
    driver: local
  staging-telegram-logs:
    driver: local
  staging-workers-logs:
    driver: local
  staging-workers-data:
    driver: local

networks:
  genfeed-staging-infra:
    name: genfeed-staging-infra
    driver: bridge
    internal: true
  genfeed-staging-api:
    name: genfeed-staging-api
    driver: bridge
  genfeed-staging-bots:
    name: genfeed-staging-bots
    driver: bridge
  genfeed-staging-workers:
    name: genfeed-staging-workers
    driver: bridge
