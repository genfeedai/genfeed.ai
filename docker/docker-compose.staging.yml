  telegram:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/telegram", "start:prod"]
    container_name: genfeed-staging-telegram
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '3022:3022'
    env_file:
      - ../.env.staging
      - ../apps/server/telegram/.env.staging
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:3010
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=3022
      - SERVICE_NAME=telegram
      - VERSION=1.0.0
    volumes:
      - staging-telegram-logs:/usr/src/app/apps/server/telegram/logs
    networks:
