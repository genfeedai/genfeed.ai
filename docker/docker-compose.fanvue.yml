services:
  fanvue:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/fanvue", "start:prod"]
    container_name: genfeed-ai-fanvue
    restart: unless-stopped
    ports:
      - '${FANVUE_PORT:-3017}:${FANVUE_PORT:-3017}'
    env_file:
      - ../.env.production
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - API_URL=http://api:${API_PORT:-3010}
      - NODE_ENV=production
      - PORT=${FANVUE_PORT:-3017}
      - SERVICE_NAME=fanvue
      - VERSION=1.0.0
    networks:
      - genfeed-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${FANVUE_PORT:-3017}/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
