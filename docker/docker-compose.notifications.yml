# Docker Compose v2 Configuration
# Notifications Service (Discord, Email, etc.)
# Connects to Redis: redis:6379 (same network as Redis service)

services:
  notifications:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/notifications", "start:prod"]
    container_name: genfeed-ai-notifications
    restart: unless-stopped
    ports:
      - '${NOTIFICATIONS_PORT:-3011}:${NOTIFICATIONS_PORT:-3011}'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${NOTIFICATIONS_PORT:-3011}
      - SERVICE_NAME=notifications
      - VERSION=1.0.0
    networks:
      - genfeed-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${NOTIFICATIONS_PORT:-3011}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
