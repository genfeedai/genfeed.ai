# Docker Compose v2 Configuration
# MCP Service (Model Context Protocol)
# Connects to Redis: redis:6379 (same network as Redis service)

services:
  mcp:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/mcp", "start:prod"]
    container_name: genfeed-ai-mcp
    restart: unless-stopped
    ports:
      - '3014:3014'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=3014
      - SERVICE_NAME=mcp
      - VERSION=1.0.0
    networks:
      - genfeed-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3014/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
