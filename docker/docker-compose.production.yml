      retries: 5
      start_period: 40s

  # ── Background workers ─────────────────────────────────────────

  workers:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/workers", "start:prod"]
    container_name: genfeed-ai-workers
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${WORKERS_PORT:-3013}:${WORKERS_PORT:-3013}'
    env_file:
      - ../.env.production
      - ../apps/server/workers/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${WORKERS_PORT:-3013}
      - SERVICE_NAME=workers
      - VERSION=1.0.0
    networks:
      - genfeed-infra
      - genfeed-workers
    volumes:
      - workers-logs:/usr/src/app/apps/server/workers/logs
      - workers-data:/usr/src/app/apps/server/workers/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${WORKERS_PORT:-3013}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  redis-data:
    driver: local
  api-logs:
    driver: local
  clips-logs:
    driver: local
  discord-logs:
    driver: local
  fanvue-logs:
    driver: local
  files-logs:
    driver: local
  mcp-logs:
    driver: local
  notifications-logs:
    driver: local
  slack-logs:
    driver: local
  telegram-logs:
    driver: local
  workers-logs:
    driver: local
  workers-data:
    driver: local

networks:
  genfeed-infra:
    name: genfeed-infra
    driver: bridge
    internal: true
  genfeed-api:
    name: genfeed-api
    driver: bridge
  genfeed-bots:
    name: genfeed-bots
    driver: bridge
  genfeed-workers:
    name: genfeed-workers
    driver: bridge
