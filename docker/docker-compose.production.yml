# Docker Compose v2 Configuration
# Production Docker Compose — single source of truth for all services
# Services: Redis, API, Notifications, Files, Workers, MCP, Clips, Discord, Fanvue, Slack, Telegram
# Used by deploy-production.sh for wave-based deployment
#
# Port scheme:
#   redis         6379
#   api           3010
#   notifications 3011
#   files         3012
#   workers       3013
#   mcp           3014
#   clips         3015
#   discord       3016
#   fanvue        3017
#   slack         3018
#   telegram      3019
#
# Environment strategy:
#   env_file: root + service envs  — shared defaults plus service overrides
#   environment:                   — Docker-network overrides + service metadata only

services:
  # ── Infrastructure ──────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: genfeed-ai-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    networks:
      - genfeed-infra
    healthcheck:
      test: ['CMD', 'sh', '-c', 'redis-cli -a $$REDIS_PASSWORD ping || exit 1']
      interval: 30s
      timeout: 3s
      retries: 5
    environment:
      - TZ=America/Los_Angeles
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # ── Core services (API dependencies) ───────────────────────────

  files:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/files", "start:prod"]
    container_name: genfeed-ai-files
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${FILES_PORT:-3012}:${FILES_PORT:-3012}'
    env_file:
      - ../.env.production
      - ../apps/server/files/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${FILES_PORT:-3012}
      - SERVICE_NAME=files
      - VERSION=1.0.0
    volumes:
      - files-logs:/usr/src/app/apps/server/files/logs
    networks:
      - genfeed-infra
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${FILES_PORT:-3012}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/mcp", "start:prod"]
    container_name: genfeed-ai-mcp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${MCP_PORT:-3014}:${MCP_PORT:-3014}'
    env_file:
      - ../.env.production
      - ../apps/server/mcp/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${MCP_PORT:-3014}
      - SERVICE_NAME=mcp
      - VERSION=1.0.0
    volumes:
      - mcp-logs:/usr/src/app/apps/server/mcp/logs
    networks:
      - genfeed-infra
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${MCP_PORT:-3014}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  notifications:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/notifications", "start:prod"]
    container_name: genfeed-ai-notifications
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${NOTIFICATIONS_PORT:-3011}:${NOTIFICATIONS_PORT:-3011}'
    env_file:
      - ../.env.production
      - ../apps/server/notifications/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${NOTIFICATIONS_PORT:-3011}
      - SERVICE_NAME=notifications
      - VERSION=1.0.0
    volumes:
      - notifications-logs:/usr/src/app/apps/server/notifications/logs
    networks:
      - genfeed-infra
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${NOTIFICATIONS_PORT:-3011}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── API (main gateway) ─────────────────────────────────────────

  api:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/api", "start:prod"]
    container_name: genfeed-ai-api
    depends_on:
      redis:
        condition: service_healthy
      files:
        condition: service_healthy
      mcp:
        condition: service_healthy
      notifications:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${API_PORT:-3010}:${API_PORT:-3010}'
    env_file:
      - ../.env.production
      - ../apps/server/api/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - GENFEEDAI_MICROSERVICES_FILES_URL=http://files:${FILES_PORT:-3012}
      - GENFEEDAI_MICROSERVICES_MCP_URL=http://mcp:${MCP_PORT:-3014}
      - GENFEEDAI_MICROSERVICES_NOTIFICATIONS_URL=http://notifications:${NOTIFICATIONS_PORT:-3011}
      - NODE_ENV=production
      - PORT=${API_PORT:-3010}
      - SERVICE_NAME=api
      - VERSION=1.0.0
    volumes:
      - api-logs:/usr/src/app/apps/server/api/logs
    networks:
      - genfeed-infra
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${API_PORT:-3010}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Clips ───────────────────────────────────────────────────────

  clips:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/clips", "start:prod"]
    container_name: genfeed-ai-clips
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${CLIPS_PORT:-3015}:${CLIPS_PORT:-3015}'
    env_file:
      - ../.env.production
      - ../apps/server/clips/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:${API_PORT:-3010}
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - GENFEEDAI_MICROSERVICES_FILES_URL=http://files:${FILES_PORT:-3012}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_ENV=production
      - PORT=${CLIPS_PORT:-3015}
      - SERVICE_NAME=clips
      - VERSION=1.0.0
    volumes:
      - clips-logs:/usr/src/app/apps/server/clips/logs
    networks:
      - genfeed-infra
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${CLIPS_PORT:-3015}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Bot services ────────────────────────────────────────────────

  discord:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/discord", "start:prod"]
    container_name: genfeed-ai-discord
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${DISCORD_PORT:-3016}:${DISCORD_PORT:-3016}'
    env_file:
      - ../.env.production
      - ../apps/server/discord/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:${API_PORT:-3010}
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=${DISCORD_PORT:-3016}
      - SERVICE_NAME=discord
      - VERSION=1.0.0
    volumes:
      - discord-logs:/usr/src/app/apps/server/discord/logs
    networks:
      - genfeed-infra
      - genfeed-bots
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${DISCORD_PORT:-3016}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  fanvue:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/fanvue", "start:prod"]
    container_name: genfeed-ai-fanvue
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${FANVUE_PORT:-3017}:${FANVUE_PORT:-3017}'
    env_file:
      - ../.env.production
      - ../apps/server/fanvue/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${FANVUE_PORT:-3017}
      - SERVICE_NAME=fanvue
      - VERSION=1.0.0
    volumes:
      - fanvue-logs:/usr/src/app/apps/server/fanvue/logs
    networks:
      - genfeed-infra
      - genfeed-bots
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${FANVUE_PORT:-3017}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  slack:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/slack", "start:prod"]
    container_name: genfeed-ai-slack
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${SLACK_PORT:-3018}:${SLACK_PORT:-3018}'
    env_file:
      - ../.env.production
      - ../apps/server/slack/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:${API_PORT:-3010}
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=${SLACK_PORT:-3018}
      - SERVICE_NAME=slack
      - VERSION=1.0.0
    volumes:
      - slack-logs:/usr/src/app/apps/server/slack/logs
    networks:
      - genfeed-infra
      - genfeed-bots
      - genfeed-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${SLACK_PORT:-3018}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  telegram:
    image: ${SERVER_IMAGE:-ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}}
    command: ["bun", "--filter", "@genfeedai/telegram", "start:prod"]
    container_name: genfeed-ai-telegram
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - '${TELEGRAM_PORT:-3019}:${TELEGRAM_PORT:-3019}'
    env_file:
      - ../.env.production
      - ../apps/server/telegram/.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:${API_PORT:-3010}
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
