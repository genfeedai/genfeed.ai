services:
  workers:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/workers", "start:prod"]
    container_name: genfeed-ai-workers
    restart: unless-stopped
    ports:
      - '${WORKERS_PORT:-3013}:${WORKERS_PORT:-3013}'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${WORKERS_PORT:-3013}
      - SERVICE_NAME=workers
      - VERSION=1.0.0
    networks:
      - genfeed-network
    volumes:
      - workers-logs:/app/logs
      - workers-data:/app/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${WORKERS_PORT:-3013}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true

volumes:
  workers-logs:
    driver: local
  workers-data:
    driver: local
