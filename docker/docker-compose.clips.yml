services:
  clips:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/clips", "start:prod"]
    container_name: genfeed-ai-clips
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GENFEEDAI_API_URL=http://api:3001
      - GENFEEDAI_API_KEY=${GENFEEDAI_API_KEY}
      - NODE_ENV=production
      - PORT=3002
    networks:
      - genfeed-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
