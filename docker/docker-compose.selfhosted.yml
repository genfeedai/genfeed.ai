services:
  postgres:
    image: postgres:16-alpine
    container_name: genfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genfeed}
      POSTGRES_USER: ${POSTGRES_USER:-genfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genfeed_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-genfeed} -d ${POSTGRES_DB:-genfeed}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  genfeed:
    # Source checkouts default to :latest. Downloaded release bundles pin this
    # through GENFEED_IMAGE_TAG in their versioned .env file.
    image: ghcr.io/genfeedai/genfeed.ai:${GENFEED_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      # Host side overridable; container side is FIXED — the entrypoint always
      # starts the app on 3000, the API on 3010, and MCP on 3014 regardless of
      # these vars (see docker/selfhosted-entrypoint.sh).
      - "${SELFHOSTED_APP_PORT:-3000}:3000"  # Web UI
      - "${SELFHOSTED_API_PORT:-3010}:3010"  # API
      - "${SELFHOSTED_MCP_PORT:-3014}:3014"  # MCP
    volumes:
      - genfeed_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3010/v1/health >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  genfeed_data:
  postgres_data:
