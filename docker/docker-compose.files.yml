# Docker Compose v2 Configuration
# Production Docker Compose for Files service (consolidated onto API instance)
# Services: Files service only

services:
  files:
    image: ghcr.io/genfeedai/cloud/server:${IMAGE_TAG:-latest}
    command: ["bun", "--filter", "@genfeedai/files", "start:prod"]
    container_name: genfeed-ai-files
    restart: unless-stopped
    ports:
      - '${FILES_PORT:-3012}:${FILES_PORT:-3012}'
    env_file:
      - ../.env.production
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - PORT=${FILES_PORT:-3012}
    networks:
      - genfeed-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${FILES_PORT:-3012}/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  genfeed-network:
    name: genfeed-network
    external: true
