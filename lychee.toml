# lychee config — offline dead-link scan for repository documentation.
#
# Scope: Markdown/MDX docs and READMEs. lychee runs as a Docker action and
# cannot crawl a rendered Next.js app (no recursion, no remote-HTML link
# extraction, and its `localhost` is the container — not the runner host). The
# website's runtime internal-link / redirect / orphan guard therefore lives in
# apps/website/scripts/check-orphans.ts, which crawls a real running build.

no_progress = true

# Resolve root-relative links ("/pricing", "/docs/...") against the production
# origin. In local-file mode lychee errors on root-relative links at the
# URI-resolution stage ("provide a root dir") BEFORE the `exclude` filter runs,
# so an `^/` exclude can't suppress them. Giving a base rewrites "/foo" to
# "https://genfeed.ai/foo", which the exclude below then drops as "Excluded"
# (no network call). The website's own check-orphans.ts owns route verification.
base_url = "https://genfeed.ai"

# Cache results between runs to cut external requests and flake.
cache = true
max_cache_age = "1d"

# External links legitimately redirect (http→https, trailing-slash); allow a few
# hops, and treat bot-blocking / rate-limit / transient gateway codes as success
# so the gate stays non-flaky on third-party hosts.
max_redirects = 5
accept = ["200", "206", "429", "502"]

# Don't descend into dependencies or build output.
exclude_path = ["node_modules", ".next", "dist", "build", ".turbo"]

# What to skip:
# - The production origin: root-relative app links ("/pricing", "/docs/...")
#   are rewritten to https://genfeed.ai/* by base_url above; they resolve to
#   Next.js/Nextra routes, not files on disk, so lychee can't verify them —
#   apps/website's check-orphans.ts owns that guard against a real running
#   build. Excluding the origin drops them without a network call.
# - Loopback (no server runs during this offline scan).
# - Hosts that aggressively block bots, producing false "dead link" reports
#   (twitter/x/linkedin return 403/999 to non-browser clients; OpenAI's
#   platform host 403s the same way on /api-keys).
# - Badge CDNs are cosmetic and intermittently return 408 to non-browser checks.
exclude = [
  "^https://genfeed\\.ai",
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "img\\.shields\\.io",
  "twitter\\.com",
  "x\\.com",
  "linkedin\\.com",
  "openai\\.com",
]
